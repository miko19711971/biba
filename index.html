<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Biba Boutique · Offerta del Giorno</title>
<!-- Font asincrono: pagina visibile subito, font si carica in background -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap"></noscript>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:       #c9a96e;
  --gold-light: #e8d5a3;
  --gold-dim:   rgba(201,169,110,0.18);
  --dark:       #0f0b05;
  --dark2:      #1a1208;
  --cream:      #faf6ef;
  --accent:     #8b1a1a;
  --red2:       #6b0f0f;
  --serif:      'Cormorant Garamond', 'Palatino Linotype', 'Book Antiqua', Georgia, serif;
  --sans:       'Jost', 'Segoe UI', system-ui, -apple-system, sans-serif;
}

html { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--dark);
  color: var(--cream);
  min-height: 100%;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════
   SCREEN MANAGEMENT
═══════════════════════════════ */
.screen { display: block; }
.screen.hidden { display: none !important; }

/* ═══════════════════════════════
   HOME — LANGUAGE SELECTION
═══════════════════════════════ */
#home {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.25rem 3rem;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,169,110,0.14) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 10% 90%, rgba(139,26,26,0.08) 0%, transparent 60%),
    var(--dark);
  position: relative;
}

#home::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: repeating-linear-gradient(
    45deg, transparent, transparent 50px,
    rgba(201,169,110,0.025) 50px, rgba(201,169,110,0.025) 51px);
  pointer-events: none;
  z-index: 0;
}
#home > * { position: relative; z-index: 1; }

.location-badge {
  font-size: 0.62rem;
  letter-spacing: 0.25em;
  color: rgba(201,169,110,0.55);
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 1.8rem;
  line-height: 1.8;
}
.location-badge span {
  display: inline-block;
  padding: 0.15rem 0.7rem;
  border: 1px solid rgba(201,169,110,0.2);
  border-radius: 2px;
}

.hero-logo { text-align: center; margin-bottom: 0.6rem; animation: fadeDown 0.9s ease both; }

.logo-biba {
  font-family: var(--serif);
  font-size: clamp(4.5rem, 18vw, 7.5rem);
  font-weight: 300;
  color: var(--gold);
  letter-spacing: 0.3em;
  line-height: 1;
  text-shadow: 0 0 60px rgba(201,169,110,0.25);
}
.logo-boutique {
  display: block;
  font-family: var(--sans);
  font-weight: 500;
  font-size: 0.72rem;
  letter-spacing: 0.6em;
  color: rgba(201,169,110,0.9);
  text-transform: uppercase;
  margin-top: 0.25rem;
}

.rule {
  width: 80px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 1.4rem auto;
}

.teaser {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(0.9rem, 3.5vw, 1.2rem);
  color: var(--gold-light);
  letter-spacing: 0.1em;
  text-align: center;
  margin-bottom: 0.5rem;
  opacity: 0.85;
}

.promo-pill {
  display: inline-block;
  background: linear-gradient(135deg, var(--accent), var(--red2));
  border: 1px solid rgba(201,169,110,0.5);
  border-radius: 30px;
  padding: 0.35rem 1.2rem;
  font-family: var(--serif);
  font-size: clamp(2rem, 8vw, 3rem);
  line-height: 1.2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.1em;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--gold-light);
  margin-bottom: 2rem;
  animation: pulseGlow 2.5s ease-in-out infinite;
}

.lang-prompt {
  font-family: var(--serif);
  font-size: clamp(0.95rem, 3.5vw, 1.3rem);
  color: rgba(201,169,110,0.7);
  letter-spacing: 0.2em;
  text-align: center;
  margin-bottom: 1.2rem;
}

.lang-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 0.4rem;
  width: 100%;
  padding: 0 0.75rem;
}

.lang-btn {
  background: rgba(201,169,110,0.06);
  border: 1px solid rgba(201,169,110,0.2);
  border-radius: 6px;
  padding: 0.4rem 0.65rem;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
  display: flex;
  align-items: center;
  gap: 0.35rem;
  color: var(--cream);
  font-family: var(--sans);
  font-size: 0.72rem;
  letter-spacing: 0.04em;
  -webkit-tap-highlight-color: transparent;
}
.lang-btn:hover, .lang-btn:active {
  background: rgba(201,169,110,0.15);
  border-color: var(--gold);
  transform: translateY(-2px);
  color: var(--gold-light);
}
.lang-flag { font-size: 1.25rem; }

.mii-footer {
  position: absolute; bottom: 1rem; left: 0; right: 0;
  text-align: center; font-size: 0.55rem;
  letter-spacing: 0.3em; color: rgba(201,169,110,0.3);
  text-transform: uppercase;
}

/* ═══════════════════════════════
   OFFER SCREEN
═══════════════════════════════ */
#offer {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background:
    radial-gradient(ellipse 100% 35% at 50% 0%, rgba(201,169,110,0.09) 0%, transparent 70%),
    var(--dark);
}

.offer-header {
  padding: 0.9rem 1.25rem;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(201,169,110,0.12);
  background: rgba(0,0,0,0.2);
  position: sticky; top: 0; z-index: 10;
}

.back-btn {
  background: none;
  border: 1px solid rgba(201,169,110,0.28);
  color: var(--gold);
  padding: 0.35rem 0.85rem; border-radius: 3px;
  cursor: pointer; font-size: 0.75rem;
  letter-spacing: 0.12em; font-family: var(--sans);
  transition: all 0.2s;
}
.back-btn:hover { background: var(--gold-dim); }

.header-logo {
  font-family: var(--serif);
  font-size: 1.35rem; color: var(--gold);
  letter-spacing: 0.25em; font-weight: 300;
}
.lang-name-tag {
  font-size: 0.65rem; letter-spacing: 0.15em;
  color: rgba(201,169,110,0.5);
  text-transform: uppercase; text-align: right;
}

.offer-headline {
  text-align: center; padding: 1.2rem 1rem 0.6rem;
}
.headline-main {
  font-family: var(--serif);
  font-size: clamp(2.4rem, 10vw, 4rem);
  font-weight: 700; color: var(--gold);
  letter-spacing: 0.05em; line-height: 0.9;
}
.headline-main .plus { color: rgba(201,169,110,1); font-weight: 700; margin: 0 0.1em; text-shadow: 0 0 12px rgba(201,169,110,0.6); }
.headline-sub {
  font-size: clamp(0.72rem, 2.8vw, 0.9rem);
  color: var(--gold-light); letter-spacing: 0.1em;
  margin-top: 0.5rem; opacity: 0.8;
}
.today-badge {
  display: inline-block; margin-top: 0.5rem;
  background: var(--gold-dim);
  border: 1px solid rgba(201,169,110,0.3);
  border-radius: 20px; padding: 0.2rem 0.9rem;
  font-size: 0.6rem; letter-spacing: 0.25em;
  color: var(--gold); text-transform: uppercase;
}

.slides-area {
  flex: 1; padding: 0.75rem 1rem 0.5rem;
  overflow: hidden; touch-action: pan-y;
}

.slide { display: none; flex-direction: column; align-items: center; animation: slideIn 0.45s ease both; }
.slide.active { display: flex; }

.combo-eyebrow {
  font-size: 0.58rem; letter-spacing: 0.35em;
  color: rgba(201,169,110,0.4); text-transform: uppercase;
  margin-bottom: 0.9rem;
}

.products-row {
  display: flex; align-items: flex-start; justify-content: center;
  gap: 0.5rem; width: 100%; max-width: 480px; margin-bottom: 1rem;
}
.prod-card { flex: 1; max-width: 130px; text-align: center; }
.prod-img-wrap {
  position: relative; width: 100%; aspect-ratio: 3/4;
  border-radius: 8px; overflow: hidden;
  border: 1px solid rgba(201,169,110,0.18);
  background: #1a1208;
}
.prod-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transform: rotate(90deg); }
.prod-name {
  font-size: 0.62rem; color: var(--gold-light);
  margin-top: 0.45rem; letter-spacing: 0.06em;
  line-height: 1.35; opacity: 0.85;
}
.prod-label {
  display: inline-block; font-size: 0.48rem;
  letter-spacing: 0.2em; color: rgba(201,169,110,0.4);
  text-transform: uppercase; margin-top: 0.15rem;
}
.plus-divider {
  flex-shrink: 0; font-size: 1.8rem; font-weight: 700;
  color: rgba(201,169,110,1); align-self: center; margin-top: -1rem;
  text-shadow: 0 0 12px rgba(201,169,110,0.6);
}

.free-block {
  width: 100%; max-width: 320px;
  background: linear-gradient(145deg, rgba(139,26,26,0.9), rgba(107,15,15,0.95));
  border: 1px solid rgba(201,169,110,0.35);
  border-radius: 10px; padding: 1rem; text-align: center;
  position: relative; overflow: hidden;
}
.free-block::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(201,169,110,0.12) 0%, transparent 65%);
  pointer-events: none;
}
.arrow-down { font-size: 1.1rem; color: rgba(201,169,110,0.35); margin-bottom: 0.5rem; display: block; position: relative; }
.free-word {
  font-family: var(--serif);
  font-size: clamp(1.8rem, 8vw, 2.8rem); font-weight: 700;
  color: var(--gold); letter-spacing: 0.15em; display: block;
  position: relative; line-height: 1;
  text-shadow: 0 0 30px rgba(201,169,110,0.4);
}
.free-img-wrap {
  width: 72px; height: 72px; border-radius: 50%; overflow: hidden;
  border: 2px solid var(--gold); margin: 0.6rem auto 0.5rem;
  position: relative; box-shadow: 0 0 20px rgba(201,169,110,0.2);
}
.free-img-wrap img { width: 100%; height: 100%; object-fit: cover; transform: rotate(90deg); }
.free-item-name {
  font-family: var(--serif);
  font-size: clamp(0.95rem, 4vw, 1.2rem);
  color: var(--gold-light); letter-spacing: 0.08em;
  position: relative; font-style: italic;
}

.dot-nav {
  display: flex; justify-content: center;
  gap: 0.5rem; padding: 0.8rem 0 0.4rem;
}
.dot {
  width: 28px; height: 3px; border-radius: 2px;
  background: rgba(201,169,110,0.2); cursor: pointer;
  transition: background 0.3s, transform 0.2s;
}
.dot.active { background: var(--gold); transform: scaleX(1.3); }

.arrow-nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.3rem 1.25rem 0.5rem;
}
.nav-arrow {
  background: none; border: 1px solid rgba(201,169,110,0.2);
  color: rgba(201,169,110,0.5); width: 36px; height: 36px;
  border-radius: 50%; font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.nav-arrow:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
.nav-arrow:disabled { opacity: 0.2; cursor: default; }
.slide-counter { font-size: 0.62rem; letter-spacing: 0.2em; color: rgba(201,169,110,0.4); }

.store-footer {
  border-top: 1px solid rgba(201,169,110,0.1);
  padding: 0.8rem 1.25rem;
  display: flex; align-items: center; justify-content: center;
  gap: 0.5rem; background: rgba(0,0,0,0.15);
}
.pin-icon { font-size: 0.85rem; opacity: 0.5; }
.store-address {
  font-size: 0.6rem; letter-spacing: 0.12em;
  color: rgba(201,169,110,0.45); text-transform: uppercase; text-align: center;
}

@keyframes fadeDown  { from { opacity:0; transform:translateY(-18px) } to { opacity:1; transform:translateY(0) } }
@keyframes fadeUp    { from { opacity:0; transform:translateY(14px)  } to { opacity:1; transform:translateY(0) } }
@keyframes slideIn   { from { opacity:0; transform:translateX(20px)  } to { opacity:1; transform:translateX(0) } }
@keyframes pulseGlow { 0%,100%{box-shadow:0 0 0 rgba(201,169,110,0)} 50%{box-shadow:0 0 18px rgba(201,169,110,0.25)} }

[dir="rtl"] { text-align: right; }
[dir="rtl"] .products-row { flex-direction: row-reverse; }
</style>
</head>
<body>

<div id="home" class="screen">
  <div class="hero-logo">
    <div class="logo-biba">BIBA</div>
    <span class="logo-boutique">B o u t i q u e</span>
  </div>
  <div class="rule"></div>
  <p class="teaser">Accessori Made in Italy · Fontana di Trevi</p>
  <div class="promo-pill"><span>2 + 1</span><span>GRATIS</span></div>
  <div class="lang-grid" id="lang-grid"></div>
  <div class="mii-footer">Made in Italy · Est. Roma</div>
</div>

<div id="offer" class="screen hidden">
  <header class="offer-header">
    <button class="back-btn" id="back-btn">&#8592; BACK</button>
    <div class="header-logo">BIBA</div>
    <div class="lang-name-tag" id="lang-tag"></div>
  </header>
  <div class="offer-headline">
    <div class="headline-main">2<span class="plus">+</span>1</div>
    <div class="headline-sub" id="offer-sub"></div>
    <div class="today-badge" id="today-badge"></div>
  </div>
  <div class="slides-area" id="slides-area"></div>
  <div class="dot-nav" id="dot-nav"></div>
  <div class="arrow-nav">
    <button class="nav-arrow" id="prev-btn">&#8592;</button>
    <span class="slide-counter" id="slide-counter"></span>
    <button class="nav-arrow" id="next-btn">&#8594;</button>
  </div>
  <footer class="store-footer">
    <span class="pin-icon">📍</span>
    <div class="store-address">Via delle Muratte 88 · Roma · Fontana di Trevi</div>
  </footer>
</div>

const TODAY_LABELS = {
  it:"Solo Oggi", en:"Today Only", fr:"Aujourd'hui Seulement",
  es:"Solo Hoy",  de:"Nur Heute",  zh:"仅限今天",
  ru:"Только Сегодня", ja:"本日限り", pl:"Tylko Dziś",
  pt:"Só Hoje",   ar:"اليوم فقط", ko:"오늘만"
};
const RTL = new Set(['ar']);
let currentLang = null, currentSlide = 0;

// Populate language grid
const grid = document.getElementById('lang-grid');
Object.entries(LANGS).forEach(([code, data]) => {
  const btn = document.createElement('button');
  btn.className = 'lang-btn';
  btn.innerHTML = '<span class="lang-flag">' + data.flag + '</span>' + data.name;
  btn.onclick = () => openLang(code);
  grid.appendChild(btn);
});

function openLang(code) {
  currentLang = code; currentSlide = 0;
  const lang = LANGS[code];
  document.body.setAttribute('dir', RTL.has(code) ? 'rtl' : 'ltr');
  document.getElementById('lang-tag').textContent   = lang.name;
  document.getElementById('offer-sub').textContent  = lang.subtitle;
  document.getElementById('today-badge').textContent = TODAY_LABELS[code] || '';
  document.getElementById('back-btn').textContent   = RTL.has(code) ? '← BACK' : '← BACK';
  buildSlides(lang);
  buildDots(lang.combos.length);
  updateNav();
  document.getElementById('home').classList.add('hidden');
  document.getElementById('offer').classList.remove('hidden');
  window.scrollTo(0, 0);
}

function buildSlides(lang) {
  const area = document.getElementById('slides-area');
  area.innerHTML = '';
  lang.combos.forEach((combo, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide' + (i === 0 ? ' active' : '');
    slide.innerHTML =
      '<div class="combo-eyebrow">' + lang.combo + ' ' + (i+1) + '</div>' +
      '<div class="products-row">' +
        '<div class="prod-card">' +
          '<div class="prod-img-wrap"><img src="' + IMGS[combo.imgs[0]] + '" loading="lazy" alt="' + combo.items[0] + '"></div>' +
          '<div class="prod-name">' + combo.items[0] + '</div>' +
          '<div class="prod-label">1</div>' +
        '</div>' +
        '<div class="plus-divider">+</div>' +
        '<div class="prod-card">' +
          '<div class="prod-img-wrap"><img src="' + IMGS[combo.imgs[1]] + '" loading="lazy" alt="' + combo.items[1] + '"></div>' +
          '<div class="prod-name">' + combo.items[1] + '</div>' +
          '<div class="prod-label">2</div>' +
        '</div>' +
      '</div>' +
      '<div class="free-block">' +
        '<span class="arrow-down">&#9660;</span>' +
        '<span class="free-word">' + lang.free + '!</span>' +
        '<div class="free-img-wrap"><img src="' + IMGS[combo.imgs[2]] + '" loading="lazy" alt="' + combo.free_item + '"></div>' +
        '<div class="free-item-name">' + combo.free_item + '</div>' +
      '</div>';
    area.appendChild(slide);
  });
  let tx = 0;
  area.addEventListener('touchstart', function(e){ tx = e.changedTouches[0].clientX; }, {passive:true});
  area.addEventListener('touchend',   function(e){
    var dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) > 45) { dx < 0 ? nextSlide() : prevSlide(); }
  }, {passive:true});
}

function buildDots(n) {
  const nav = document.getElementById('dot-nav');
  nav.innerHTML = '';
  for (var i = 0; i < n; i++) {
    var d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.onclick = (function(idx){ return function(){ goTo(idx); }; })(i);
    nav.appendChild(d);
  }
}

function goTo(n) {
  var slides = document.querySelectorAll('.slide');
  var dots   = document.querySelectorAll('.dot');
  slides[currentSlide].classList.remove('active');
  dots[currentSlide].classList.remove('active');
  currentSlide = n;
  slides[currentSlide].classList.add('active');
  dots[currentSlide].classList.add('active');
  updateNav();
}

function nextSlide() { if (currentSlide < LANGS[currentLang].combos.length - 1) goTo(currentSlide + 1); }
function prevSlide() { if (currentSlide > 0) goTo(currentSlide - 1); }

function updateNav() {
  var total = LANGS[currentLang].combos.length;
  document.getElementById('prev-btn').disabled = (currentSlide === 0);
  document.getElementById('next-btn').disabled = (currentSlide === total - 1);
  document.getElementById('slide-counter').textContent = (currentSlide + 1) + ' / ' + total;
}

document.getElementById('back-btn').onclick = function() {
  document.getElementById('offer').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
  document.body.removeAttribute('dir');
  window.scrollTo(0, 0);
};
document.getElementById('prev-btn').onclick = prevSlide;
document.getElementById('next-btn').onclick = nextSlide;
</script>
