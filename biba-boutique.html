<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Biba Boutique">
<title>Biba Boutique</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ══ SCREEN 0 – Home (play button) ══ */
  #screen0 {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
    background: #000;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  #screen0.hidden { display: none; }

  #screen0 canvas {
    position: absolute;
    top: 0; right: 0; bottom: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  .s0-center {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .s0-btn-wrap {
    position: relative;
    width: 280px;
    height: 280px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .s0-halo {
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(255,200,0,0.6);
    animation: s0HaloExpand 2.4s ease-out infinite;
  }
  .s0-halo:nth-child(2) { animation-delay: 0.8s; }
  .s0-halo:nth-child(3) { animation-delay: 1.6s; }

  @keyframes s0HaloExpand {
    0%   { width: 280px; height: 280px; opacity: 0.9; border-color: rgba(255,200,0,0.8); }
    100% { width: 540px; height: 540px; opacity: 0;   border-color: rgba(255,120,0,0); }
  }

  .s0-btn {
    position: relative;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 30%, #fff9c4 0%, #ffd700 30%, #ff8c00 65%, #cc5500 100%);
    box-shadow:
      0 0 0 6px rgba(255,200,0,0.2),
      0 20px 0 rgba(120,50,0,0.9),
      0 24px 40px rgba(0,0,0,0.8),
      0 0 80px rgba(255,160,0,0.9),
      0 0 160px rgba(255,100,0,0.6),
      inset 0 6px 30px rgba(255,255,255,0.45),
      inset 0 -8px 20px rgba(0,0,0,0.35);
    border: 2px solid rgba(255,230,100,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: s0BtnPulse 1.8s ease-in-out infinite;
    transition: transform 0.08s, box-shadow 0.08s;
    z-index: 2;
  }

  @keyframes s0BtnPulse {
    0%,100% {
      box-shadow:
        0 20px 0 rgba(120,50,0,0.9),
        0 24px 40px rgba(0,0,0,0.8),
        0 0 80px rgba(255,160,0,0.9),
        0 0 160px rgba(255,100,0,0.6),
        inset 0 6px 30px rgba(255,255,255,0.45),
        inset 0 -8px 20px rgba(0,0,0,0.35);
    }
    50% {
      box-shadow:
        0 20px 0 rgba(120,50,0,0.9),
        0 24px 40px rgba(0,0,0,0.8),
        0 0 130px rgba(255,200,0,1),
        0 0 260px rgba(255,120,0,0.9),
        inset 0 6px 30px rgba(255,255,255,0.55),
        inset 0 -8px 20px rgba(0,0,0,0.35);
    }
  }

  .s0-btn:active {
    transform: translateY(16px);
    box-shadow:
      0 4px 0 rgba(120,50,0,0.9),
      0 6px 10px rgba(0,0,0,0.7),
      0 0 40px rgba(255,160,0,0.5),
      inset 0 4px 20px rgba(255,255,255,0.3);
  }

  .s0-triangle {
    width: 0; height: 0;
    border-top: 48px solid transparent;
    border-bottom: 48px solid transparent;
    border-left: 80px solid rgba(0,0,0,0.8);
    margin-left: 16px;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.5));
  }

  .s0-touch-text {
    margin-top: 50px;
    font-family: 'Oswald', sans-serif;
    font-size: 56px;
    font-weight: 700;
    letter-spacing: 20px;
    color: #fff;
    text-transform: uppercase;
    animation: s0Blink 1s step-end infinite;
    text-shadow:
      0 0 10px #fff,
      0 0 30px rgba(255,220,80,1),
      0 0 70px rgba(255,180,0,0.9),
      0 0 120px rgba(255,120,0,0.7);
  }

  @keyframes s0Blink {
    0%, 60%, 100% { opacity: 1; }
    70%, 90%      { opacity: 0.1; }
  }

  .s0-arrow {
    margin-top: 16px;
    font-size: 30px;
    color: rgba(255,200,0,0.8);
    animation: s0ArrowBounce 1.1s ease-in-out infinite;
    text-shadow: 0 0 20px rgba(255,180,0,0.9);
  }

  @keyframes s0ArrowBounce {
    0%,100% { transform: translateY(0); opacity: 0.5; }
    50%     { transform: translateY(10px); opacity: 1; }
  }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8D08A;
    --cream: #FAF6EE;
    --dark: #1A1208;
    --mid: #3D2B0A;
  }

  body {
    min-height: 100vh;
    background: var(--dark);
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; right: 0; bottom: 0; left: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.10) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(61,43,10,0.8) 0%, var(--dark) 70%);
    z-index: 0;
    pointer-events: none;
  }

  .screen { width: 100%; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
  .screen.hidden { display: none; }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 580px;
    padding: 40px 28px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  /* ── Logo ── */
  .logo-area {
    text-align: center;
    animation: fadeDown 0.8s ease both;
  }
  .logo-area img {
    width: 220px;
    max-width: 65vw;
    height: auto;
    display: block;
    margin: 0 auto;
  }

  .divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto;
    animation: fadeDown 0.8s 0.1s ease both;
  }

  /* ── Screen 1: istruzioni + griglia ── */
  .instruction {
    text-align: center;
    animation: fadeDown 0.8s 0.2s ease both;
  }
  .instruction p {
    font-size: 1.05rem;
    color: var(--gold-light);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.9;
  }

  .lang-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
    animation: fadeUp 0.8s 0.3s ease both;
  }
  .lang-btn {
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 12px;
    padding: 18px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.25s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    aspect-ratio: 1 / 1;
  }
  .lang-btn:active, .lang-btn.active {
    background: rgba(201,168,76,0.18);
    border-color: var(--gold);
    transform: scale(0.97);
  }
  .lang-btn .flag {
    width: 70%;
    height: auto;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    border-radius: 4px;
    display: block;
  }

  /* ── Player (casella testo) — identico all'originale ── */
  .player {
    width: 100%;
    background: rgba(201,168,76,0.05);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 16px;
    padding: 36px 32px;
    text-align: center;
    min-height: 150px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    animation: fadeUp 0.8s 0.2s ease both;
  }
  .offer-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.55rem;
    color: var(--cream);
    line-height: 1.75;
    font-style: italic;
    min-height: 2em;
    text-shadow: 0 0 20px rgba(201,168,76,0.25);
  }

  /* ── Speaking indicator ── */
  .speaking-indicator {
    display: none;
    align-items: center;
    gap: 6px;
  }
  .speaking-indicator.visible { display: flex; }
  .speaking-indicator span {
    display: inline-block;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse 0.6s infinite alternate;
  }
  .speaking-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .speaking-indicator span:nth-child(3) { animation-delay: 0.4s; }

  /* ── Pulsanti ── */
  .play-btn {
    background: var(--gold);
    color: var(--dark);
    border: none;
    border-radius: 50px;
    padding: 14px 38px;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .play-btn:active { transform: scale(0.96); background: var(--gold-light); }

  .back-btn {
    background: transparent;
    color: var(--gold-light);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 50px;
    padding: 14px 30px;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.95rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .back-btn:active { transform: scale(0.96); background: rgba(201,168,76,0.1); }

  .s2-actions {
    display: flex;
    gap: 14px;
    align-items: center;
  }

  /* ── 3 box articoli ── */
  .items-row {
    display: flex;
    gap: 14px;
    width: 100%;
    justify-content: center;
    animation: fadeUp 0.8s 0.3s ease both;
  }
  .item-box {
    flex: 1;
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 16px;
    padding: 22px 8px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-align: center;
    min-height: 120px;
    transition: all 0.5s ease;
  }
  .item-box .box-icon {
    font-size: 2.4rem;
    line-height: 1;
  }
  .item-box .box-label {
    font-size: 0.95rem;
    color: var(--gold-light);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    opacity: 0.85;
  }
  .item-box .free-badge {
    display: none;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--dark);
    background: var(--gold);
    border-radius: 20px;
    padding: 4px 14px;
  }
  .math-sign {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--gold);
    opacity: 0.8;
    align-self: center;
    flex-shrink: 0;
  }

  .item-box.item-active {
    background: rgba(201,168,76,0.22);
    border-color: var(--gold);
    animation: freePulse 0.4s ease-in-out infinite alternate;
  }
  .item-box.item-active .box-label { opacity: 1; color: var(--cream); }
  #box3.item-active .free-badge    { display: block; }

  @keyframes freePulse {
    from { box-shadow: 0 0 10px rgba(201,168,76,0.3); border-color: var(--gold); }
    to   { box-shadow: 0 0 28px rgba(201,168,76,0.85); border-color: var(--gold-light); }
  }


  @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp   { from { opacity: 0; transform: translateY(16px);  } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse    { from { transform: scaleY(0.5); opacity: 0.4; }    to { transform: scaleY(1.8); opacity: 1; } }
  @keyframes blink    { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
</style>
</head>
<body>

<!-- ══════════ SCREEN 0 – Home (play button) ══════════ -->
<div id="screen0">
  <canvas id="s0canvas"></canvas>
  <div class="s0-center">
    <div class="s0-btn-wrap">
      <div class="s0-halo"></div>
      <div class="s0-halo"></div>
      <div class="s0-halo"></div>
      <div class="s0-btn" id="s0btn">
        <div class="s0-triangle"></div>
      </div>
    </div>
    <div class="s0-touch-text">TOUCH</div>
    <div class="s0-arrow">▼</div>
  </div>
</div>

<!-- ══════════ SCREEN 1 – selezione lingua ══════════ -->
<div id="screen1" class="screen">
  <div class="container">

    <div class="logo-area">
      <img src="logo.png" alt="Biba Boutique">
    </div>

    <div class="divider"></div>

    <div class="instruction">
      <p>Seleziona la tua lingua &nbsp;·&nbsp; Select your language</p>
    </div>

    <div class="lang-grid">
      <button class="lang-btn" data-lang="it-IT" onclick="speak('it-IT')"><img class="flag" src="https://flagcdn.com/w80/it.png" alt="Italiano"></button>
      <button class="lang-btn" data-lang="en-GB" onclick="speak('en-GB')"><img class="flag" src="https://flagcdn.com/w80/gb.png" alt="English"></button>
      <button class="lang-btn" data-lang="fr-FR" onclick="speak('fr-FR')"><img class="flag" src="https://flagcdn.com/w80/fr.png" alt="Français"></button>
      <button class="lang-btn" data-lang="de-DE" onclick="speak('de-DE')"><img class="flag" src="https://flagcdn.com/w80/de.png" alt="Deutsch"></button>
      <button class="lang-btn" data-lang="es-ES" onclick="speak('es-ES')"><img class="flag" src="https://flagcdn.com/w80/es.png" alt="Español"></button>
      <button class="lang-btn" data-lang="pt-PT" onclick="speak('pt-PT')"><img class="flag" src="https://flagcdn.com/w80/pt.png" alt="Português"></button>
      <button class="lang-btn" data-lang="ru-RU" onclick="speak('ru-RU')"><img class="flag" src="https://flagcdn.com/w80/ru.png" alt="Русский"></button>
      <button class="lang-btn" data-lang="zh-CN" onclick="speak('zh-CN')"><img class="flag" src="https://flagcdn.com/w80/cn.png" alt="中文"></button>
      <button class="lang-btn" data-lang="ja-JP" onclick="speak('ja-JP')"><img class="flag" src="https://flagcdn.com/w80/jp.png" alt="日本語"></button>
      <button class="lang-btn" data-lang="ko-KR" onclick="speak('ko-KR')"><img class="flag" src="https://flagcdn.com/w80/kr.png" alt="한국어"></button>
      <button class="lang-btn" data-lang="ar-SA" onclick="speak('ar-SA')"><img class="flag" src="https://flagcdn.com/w80/sa.png" alt="العربية"></button>
      <button class="lang-btn" data-lang="nl-NL" onclick="speak('nl-NL')"><img class="flag" src="https://flagcdn.com/w80/nl.png" alt="Nederlands"></button>
      <button class="lang-btn" data-lang="he-IL" onclick="speak('he-IL')"><img class="flag" src="https://flagcdn.com/w80/il.png" alt="עברית"></button>
      <button class="lang-btn" data-lang="pl-PL" onclick="speak('pl-PL')"><img class="flag" src="https://flagcdn.com/w80/pl.png" alt="Polski"></button>
      <button class="lang-btn" data-lang="hr-HR" onclick="speak('hr-HR')"><img class="flag" src="https://flagcdn.com/w80/hr.png" alt="Hrvatski"></button>
      <button class="lang-btn" data-lang="vi-VN" onclick="speak('vi-VN')"><img class="flag" src="https://flagcdn.com/w80/vn.png" alt="Tiếng Việt"></button>
      <button class="lang-btn" data-lang="el-GR" onclick="speak('el-GR')"><img class="flag" src="https://flagcdn.com/w80/gr.png" alt="Ελληνικά"></button>
      <button class="lang-btn" data-lang="tr-TR" onclick="speak('tr-TR')"><img class="flag" src="https://flagcdn.com/w80/tr.png" alt="Türkçe"></button>
    </div>

  </div>
</div>

<!-- ══════════ SCREEN 2 – testo + articoli ══════════ -->
<div id="screen2" class="screen hidden">
  <div class="container">

    <div class="logo-area">
      <img src="logo.png" alt="Biba Boutique">
    </div>

    <div class="divider"></div>

    <!-- casella testo — identica all'originale, subito sotto il logo -->
    <div class="player">
      <div class="offer-text" id="offerText2"></div>
      <div class="speaking-indicator" id="speakingIndicator2">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- 3 box articoli — sotto la casella testo -->
    <div class="items-row">
      <div class="item-box" id="box1">
        <div class="box-icon">👒</div>
        <div class="box-label" id="lbl1"></div>
      </div>
      <div class="math-sign">+</div>
      <div class="item-box" id="box2">
        <div class="box-icon">🧣</div>
        <div class="box-label" id="lbl2"></div>
      </div>
      <div class="math-sign">=</div>
      <div class="item-box" id="box3">
        <div class="box-icon">🎁</div>
        <div class="box-label" id="lbl3"></div>
        <div class="free-badge" id="freeBadge"></div>
      </div>
    </div>

    <!-- pulsanti sempre visibili sotto i box -->
    <div class="s2-actions">
      <button class="play-btn" id="replayBtn2" style="display:none" onclick="replayLast()">▶ Replay</button>
      <button class="back-btn" onclick="goBack()">← Lingue</button>
    </div>

  </div>
</div>

<script>
const messages = {
  'it-IT': 'Benvenuta in Biba Boutique. La nostra offerta di oggi è: acquista due articoli e il terzo è completamente gratuito. Puoi decidere la combinazione a tuo piacimento. Chiedi alla nostra assistente per maggiori informazioni.',
  'en-GB': 'Welcome to Biba Boutique. Our offer today is: buy two items and get the third one completely free. You can choose any combination you like. Ask our assistant for more information.',
  'fr-FR': "Bienvenue chez Biba Boutique. Notre offre du jour : achetez deux articles et le troisième est entièrement gratuit. Vous pouvez choisir la combinaison à votre convenance. Demandez à notre assistante pour plus d'informations.",
  'de-DE': 'Willkommen bei Biba Boutique. Unser heutiges Angebot: Kaufen Sie zwei Artikel und erhalten Sie den dritten völlig kostenlos. Sie können die Kombination frei wählen. Fragen Sie unsere Mitarbeiterin für weitere Informationen.',
  'es-ES': 'Bienvenida a Biba Boutique. Nuestra oferta de hoy: compra dos artículos y el tercero es completamente gratis. Puedes elegir la combinación que prefieras. Pregunta a nuestra asistente para más información.',
  'pt-PT': 'Bem-vinda à Biba Boutique. A nossa oferta de hoje: compre dois artigos e o terceiro é completamente gratuito. Pode escolher a combinação que preferir. Pergunte à nossa assistente para mais informações.',
  'ru-RU': 'Добро пожаловать в Biba Boutique. Наше предложение сегодня: купите два товара и третий совершенно бесплатно. Вы можете выбрать любую комбинацию. Спросите нашего консультанта для получения дополнительной информации.',
  'zh-CN': '欢迎来到Biba Boutique。我们今天的优惠：购买任意两件商品，第三件完全免费。您可以自由选择任意组合。如需更多信息，请询问我们的助理。',
  'ja-JP': 'ビバ・ブティックへようこそ。本日の特別なご案内：お好きな商品を2点お選びいただくと、3点目が無料になります。組み合わせはお客様のお好みでお選びください。スタッフにお気軽にお声がけください。',
  'ko-KR': 'Biba Boutique에 오신 것을 환영합니다. 오늘의 특별 혜택: 두 가지 상품을 구매하시면 세 번째 상품이 무료입니다. 원하시는 조합을 자유롭게 선택하실 수 있습니다. 직원에게 문의해 주세요.',
  'ar-SA': 'مرحباً بكم في بيبا بوتيك. عرضنا اليوم: اشترِ قطعتين واحصل على الثالثة مجاناً. يمكنك اختيار أي تشكيلة تريدها. اسأل مساعدتنا للمزيد من المعلومات.',

let lastLang     = null;
let currentAudio = null;
let typeTimer    = null;
let seqTimers    = [];

const isLocalServer = !['github.io', 'github.com'].some(h => location.hostname.includes(h));

function startTypewriter(text, durationSec) {
  const el = document.getElementById('offerText2');
  el.textContent = '';
  if (typeTimer) clearInterval(typeTimer);
  const chars = [...text];
  const delay = Math.max(30, Math.min((durationSec * 1000) / chars.length, 110));
  let i = 0;
  typeTimer = setInterval(() => {
    if (i < chars.length) { el.textContent += chars[i++]; }
    else { clearInterval(typeTimer); typeTimer = null; }
  }, delay);
}

function stopTypewriter(text) {
  if (typeTimer) { clearInterval(typeTimer); typeTimer = null; }
  document.getElementById('offerText2').textContent = text;
}

function clearSeq() {
  seqTimers.forEach(clearTimeout);
  seqTimers = [];
  ['box1','box2','box3'].forEach(id => document.getElementById(id).classList.remove('item-active'));
}

/* sequenza 1→2→3 ripetuta 5 volte, poi mostra Replay */
function runSequence(onDone) {
  clearSeq();
  const ids      = ['box1','box2','box3'];
  const ON       = 300;   // ms box acceso
  const OFF      = 60;    // ms pausa tra box
  const PAUSE    = 175;   // ms pausa tra cicli
  const CYCLES   = 5;
  let t          = 0;

  for (let cycle = 0; cycle < CYCLES; cycle++) {
    ids.forEach((id, idx) => {
      const start = cycle * (ids.length * (ON + OFF) + PAUSE) + idx * (ON + OFF);
      seqTimers.push(setTimeout(() => document.getElementById(id).classList.add('item-active'),    t + start));
      seqTimers.push(setTimeout(() => document.getElementById(id).classList.remove('item-active'), t + start + ON));
    });
  }

  const totalMs = CYCLES * (ids.length * (ON + OFF) + PAUSE);
  seqTimers.push(setTimeout(() => { clearSeq(); if (onDone) onDone(); }, t + totalMs));
}

function speak(lang) {
  if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
  clearSeq();
  stopTypewriter('');

  lastLang = lang;

  document.getElementById('screen1').classList.add('hidden');
  document.getElementById('screen2').classList.remove('hidden');

  const data = langData[lang] || { labels: ['1','2','3'], free: 'FREE', trigger: 8 };
  document.getElementById('lbl1').textContent      = data.labels[0];
  document.getElementById('lbl2').textContent      = data.labels[1];
  document.getElementById('lbl3').textContent      = data.labels[2];
  document.getElementById('freeBadge').textContent = data.free;

  const indicator = document.getElementById('speakingIndicator2');
  const replayBtn = document.getElementById('replayBtn2');
  indicator.classList.add('visible');
  replayBtn.style.display = 'none';

  const onAudioEnd = (fullText) => {
    stopTypewriter(fullText);
    indicator.classList.remove('visible');
    runSequence(() => { setTimeout(goHome, 2000); });
  };

  if (isLocalServer) {
    fetch(`/play/${lang}`)
      .then(r => r.json())
      .then(d => {
        const dur = d.duration || 14;
        startTypewriter(messages[lang], dur);
        setTimeout(() => onAudioEnd(messages[lang]), dur * 1000);
      })
      .catch(() => onAudioEnd(messages[lang]));
  } else {
    currentAudio = new Audio(`audio/${lang}.mp3`);
    currentAudio.onloadedmetadata = () => startTypewriter(messages[lang], currentAudio.duration);
    currentAudio.onended  = () => onAudioEnd(messages[lang]);
    currentAudio.onerror  = () => onAudioEnd(messages[lang]);
    currentAudio.play();
  }
}

function replayLast() {
  if (lastLang) speak(lastLang);
}

function goBack() {
  if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
  clearSeq();
  stopTypewriter('');
  document.getElementById('screen2').classList.add('hidden');
  document.getElementById('screen1').classList.remove('hidden');
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
}

function goHome() {
  if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
  clearSeq();
  stopTypewriter('');
  document.getElementById('screen2').classList.add('hidden');
  document.getElementById('screen1').classList.add('hidden');
  document.getElementById('screen0').classList.remove('hidden');
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
}

/* ── Canvas embers & burst (screen0) ── */
(function() {
  const canvas = document.getElementById('s0canvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const embers = Array.from({length: 70}, () => ({
    x: Math.random() * 9999, y: Math.random() * 9999,
    r: 0.5 + Math.random() * 2,
    vy: -(0.3 + Math.random() * 0.6), vx: (Math.random() - 0.5) * 0.4,
    opacity: 0, maxOp: 0.3 + Math.random() * 0.5,
    hue: 25 + Math.random() * 35, phase: Math.random() * Math.PI * 2
  }));

  let bursts = [];
  function spawnBurst(x, y, n) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2, spd = 3 + Math.random() * 9;
      bursts.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
        r: 1.5 + Math.random()*3.5, life: 1,
        decay: 0.014 + Math.random()*0.025,
        hue: 15 + Math.random()*55, sat: 80 + Math.random()*20,
        glow: Math.random() > 0.5 });
    }
  }

  function autoBurst() {
    if (!document.getElementById('screen0').classList.contains('hidden') && W)
      spawnBurst(W/2, H/2 - 60, 45);
    setTimeout(autoBurst, 2800);
  }
  setTimeout(autoBurst, 800);

  let t = 0;
  function draw() {
    requestAnimationFrame(draw);
    if (document.getElementById('screen0').classList.contains('hidden')) return;
    ctx.clearRect(0, 0, W, H);
    t++;
    embers.forEach(e => {
      e.x += e.vx + Math.sin(t*0.02 + e.phase)*0.3;
      e.y += e.vy;
      e.opacity = e.maxOp * (0.5 + 0.5*Math.sin(t*0.03 + e.phase));
      if (e.y < -10) { e.y = H+10; e.x = Math.random()*W; e.opacity = 0; }
      if (e.x < 0) e.x = W; if (e.x > W) e.x = 0;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${e.hue},100%,70%,${e.opacity})`;
      ctx.fill();
    });
    bursts = bursts.filter(b => b.life > 0);
    bursts.forEach(b => {
      b.x += b.vx; b.y += b.vy; b.vy += 0.18; b.vx *= 0.97; b.life -= b.decay;
      const a = Math.max(0, b.life);
      if (b.glow) {
        const g = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*3*a);
        g.addColorStop(0, `hsla(${b.hue},${b.sat}%,80%,${a*0.8})`);
        g.addColorStop(1, `hsla(${b.hue},${b.sat}%,50%,0)`);
        ctx.beginPath(); ctx.arc(b.x,b.y,b.r*3*a,0,Math.PI*2);
        ctx.fillStyle = g; ctx.fill();
      }
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r*a,0,Math.PI*2);
      ctx.fillStyle = `hsla(${b.hue},${b.sat}%,70%,${a})`; ctx.fill();
    });
  }
  requestAnimationFrame(draw);

  function handleS0Touch(x, y) {
    spawnBurst(x, y, 90);
    setTimeout(() => {
      document.getElementById('screen0').classList.add('hidden');
      document.getElementById('screen1').classList.remove('hidden');
    }, 200);
  }
  document.getElementById('screen0').addEventListener('pointerdown', e => {
    handleS0Touch(e.clientX, e.clientY);
  });
  document.getElementById('screen0').addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    handleS0Touch(t.clientX, t.clientY);
  }, { passive: false });
})();
