<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Biba Boutique</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C;
    --gold-light: #E8D08A;
    --cream: #FAF6EE;
    --dark: #1A1208;
  }
  body {
    min-height: 100vh;
    background: var(--dark);
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(201,168,76,0.12) 0%, var(--dark) 70%);
    z-index: 0;
    pointer-events: none;
  }
  .screen {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-y: auto;
    padding: 40px 24px 60px;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .screen.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateX(40px);
  }
  .logo { text-align: center; margin-bottom: 8px; }
  .logo .brand {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 2.6rem;
    color: var(--gold);
    letter-spacing: 0.1em;
  }
  .logo .sub {
    font-size: 0.6rem;
    color: var(--gold-light);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-top: 4px;
  }
  .divider {
    width: 100px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 16px auto;
  }

/* SCREEN 1 */
#screen1 { gap: 20px; }
.instruction {
font-size: 0.7rem;
color: var(–gold-light);
letter-spacing: 0.2em;
text-transform: uppercase;
opacity: 0.8;
text-align: center;
}
.lang-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 12px;
width: 100%;
max-width: 420px;
}
.lang-btn {
background: rgba(201,168,76,0.06);
border: 1px solid rgba(201,168,76,0.2);
border-radius: 12px;
padding: 16px 8px;
display: flex;
flex-direction: column;
align-items: center;
gap: 8px;
cursor: pointer;
transition: all 0.2s ease;
-webkit-tap-highlight-color: transparent;
}
.lang-btn:active { background: rgba(201,168,76,0.2); border-color: var(–gold); transform: scale(0.96); }
.lang-btn .flag { font-size: 2.2rem; line-height: 1; }
.lang-btn .label { font-size: 0.58rem; color: var(–gold-light); letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.75; }

/* SCREEN 2 */
#screen2 { gap: 24px; justify-content: center; }
.message-box {
width: 100%;
max-width: 440px;
background: rgba(201,168,76,0.05);
border: 1px solid rgba(201,168,76,0.2);
border-radius: 16px;
padding: 28px 24px;
min-height: 110px;
text-align: center;
}
.message-text {
font-family: ‘Playfair Display’, serif;
font-size: 1.2rem;
color: var(–cream);
line-height: 1.85;
font-style: italic;
}
.word { display: inline; opacity: 0; transition: opacity 0.25s ease; }
.word.visible { opacity: 1; }

.graphic {
display: flex;
align-items: center;
justify-content: center;
gap: 14px;
opacity: 0;
transform: translateY(20px);
transition: opacity 0.6s ease, transform 0.6s ease;
}
.graphic.visible { opacity: 1; transform: translateY(0); }
.item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.item-icon {
width: 80px; height: 80px;
border: 2px solid var(–gold);
border-radius: 12px;
display: flex; align-items: center; justify-content: center;
font-size: 2.2rem;
background: rgba(201,168,76,0.08);
position: relative;
}
.item-icon.free { border-color: #4CAF50; background: rgba(76,175,80,0.1); }
.item-icon.free::after {
content: ‘FREE’;
position: absolute;
top: -12px; right: -10px;
background: #4CAF50;
color: white;
font-size: 0.48rem;
font-weight: 700;
letter-spacing: 0.1em;
padding: 3px 6px;
border-radius: 4px;
font-family: ‘Montserrat’, sans-serif;
}
.item-label { font-size: 0.58rem; color: var(–gold-light); letter-spacing: 0.13em; text-transform: uppercase; }
.plus { font-size: 1.8rem; color: var(–gold); margin-top: -20px; }
.equals { font-size: 1.4rem; color: var(–gold); margin-top: -20px; }

.speaking { display: none; align-items: center; gap: 5px; }
.speaking.visible { display: flex; }
.speaking span {
width: 5px; height: 5px; border-radius: 50%;
background: var(–gold);
animation: pulse 0.6s infinite alternate;
}
.speaking span:nth-child(2) { animation-delay: 0.2s; }
.speaking span:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse {
from { transform: scaleY(0.5); opacity: 0.4; }
to   { transform: scaleY(1.8); opacity: 1; }
}

.action-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.btn-gold {
background: var(–gold); color: var(–dark);
border: none; border-radius: 50px;
padding: 12px 28px;
font-family: ‘Montserrat’, sans-serif;
font-size: 0.65rem; font-weight: 700;
letter-spacing: 0.2em; text-transform: uppercase;
cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.btn-outline {
background: transparent; color: var(–gold);
border: 1px solid var(–gold); border-radius: 50px;
padding: 12px 28px;
font-family: ‘Montserrat’, sans-serif;
font-size: 0.65rem; font-weight: 600;
letter-spacing: 0.2em; text-transform: uppercase;
cursor: pointer; -webkit-tap-highlight-color: transparent;
}
</style>

</head>
<body>

<div class="screen" id="screen1">
  <div class="logo"><div class="brand">Biba</div><div class="sub">Boutique</div></div>
  <div class="divider"></div>
  <div class="instruction">Seleziona la tua lingua &nbsp;·&nbsp; Select your language</div>
  <div class="lang-grid">
    <button class="lang-btn" onclick="goMessage('it-IT')"><span class="flag">🇮🇹</span><span class="label">Italiano</span></button>
    <button class="lang-btn" onclick="goMessage('en-GB')"><span class="flag">🇬🇧</span><span class="label">English</span></button>
    <button class="lang-btn" onclick="goMessage('fr-FR')"><span class="flag">🇫🇷</span><span class="label">Français</span></button>
    <button class="lang-btn" onclick="goMessage('de-DE')"><span class="flag">🇩🇪</span><span class="label">Deutsch</span></button>
    <button class="lang-btn" onclick="goMessage('es-ES')"><span class="flag">🇪🇸</span><span class="label">Español</span></button>
    <button class="lang-btn" onclick="goMessage('pt-PT')"><span class="flag">🇵🇹</span><span class="label">Português</span></button>
    <button class="lang-btn" onclick="goMessage('ru-RU')"><span class="flag">🇷🇺</span><span class="label">Русский</span></button>
    <button class="lang-btn" onclick="goMessage('zh-CN')"><span class="flag">🇨🇳</span><span class="label">中文</span></button>
    <button class="lang-btn" onclick="goMessage('ja-JP')"><span class="flag">🇯🇵</span><span class="label">日本語</span></button>
    <button class="lang-btn" onclick="goMessage('ko-KR')"><span class="flag">🇰🇷</span><span class="label">한국어</span></button>
    <button class="lang-btn" onclick="goMessage('ar-SA')"><span class="flag">🇸🇦</span><span class="label">العربية</span></button>
    <button class="lang-btn" onclick="goMessage('nl-NL')"><span class="flag">🇳🇱</span><span class="label">Nederlands</span></button>
    <button class="lang-btn" onclick="goMessage('he-IL')"><span class="flag">🇮🇱</span><span class="label">עברית</span></button>
  </div>
</div>

<div class="screen hidden" id="screen2">
  <div class="logo"><div class="brand">Biba</div><div class="sub">Boutique</div></div>
  <div class="divider"></div>
  <div class="message-box"><div class="message-text" id="msgText"></div></div>
  <div class="speaking" id="speakDots"><span></span><span></span><span></span></div>
  <div class="graphic" id="graphic">
    <div class="item"><div class="item-icon">👜</div><div class="item-label" id="lbl1"></div></div>
    <div class="plus">+</div>
    <div class="item"><div class="item-icon">🧣</div><div class="item-label" id="lbl2"></div></div>
    <div class="equals">=</div>
    <div class="item"><div class="item-icon free">🎁</div><div class="item-label" id="lbl3"></div></div>
  </div>
  <div class="action-row">
    <button class="btn-gold" onclick="replayMsg()">↺ Replay</button>
    <button class="btn-outline" onclick="goBack()">← Lingue</button>
  </div>
</div>

<script>
const messages = {
  'it-IT': { text: 'Benvenuto in Biba Boutique. La nostra offerta di oggi è: acquista due articoli e il terzo è completamente gratuito. Puoi decidere la combinazione a tuo piacimento.', labels: ['Articolo 1','Articolo 2','Articolo 3'], trigger: 16 },
  'en-GB': { text: 'Welcome to Biba Boutique. Our offer today is: buy two items and the third one is completely free. You can choose any combination you like.', labels: ['Item 1','Item 2','Item 3'], trigger: 14 },
  'fr-FR': { text: 'Bienvenue chez Biba Boutique. Notre offre du jour: achetez deux articles et le troisième est entièrement gratuit. Vous pouvez choisir la combinaison à votre convenance.', labels: ['Article 1','Article 2','Article 3'], trigger: 15 },
  'de-DE': { text: 'Willkommen bei Biba Boutique. Unser heutiges Angebot: Kaufen Sie zwei Artikel und der dritte ist völlig kostenlos. Sie können die Kombination frei wählen.', labels: ['Artikel 1','Artikel 2','Artikel 3'], trigger: 14 },
  'es-ES': { text: 'Bienvenido a Biba Boutique. Nuestra oferta de hoy: compra dos artículos y el tercero es completamente gratis. Puedes elegir la combinación que prefieras.', labels: ['Artículo 1','Artículo 2','Artículo 3'], trigger: 14 },
  'pt-PT': { text: 'Bem-vindo à Biba Boutique. A nossa oferta de hoje: compre dois artigos e o terceiro é completamente gratuito. Pode escolher a combinação que preferir.', labels: ['Artigo 1','Artigo 2','Artigo 3'], trigger: 14 },
  'ru-RU': { text: 'Добро пожаловать в Biba Boutique. Наше предложение: купите два товара и третий совершенно бесплатно. Вы можете выбрать любую комбинацию.', labels: ['Товар 1','Товар 2','Товар 3'], trigger: 10 },
  'zh-CN': { text: '欢迎来到Biba Boutique。我们今天的优惠：购买任意两件商品，第三件完全免费。您可以自由选择任意组合。', labels: ['商品一','商品二','商品三'], trigger: 8 },
  'ja-JP': { text: 'ビバ・ブティックへようこそ。本日の特別なご案内：お好きな商品を2点お選びいただくと、3点目が無料になります。', labels: ['商品1','商品2','商品3'], trigger: 8 },
  'ko-KR': { text: 'Biba Boutique에 오신 것을 환영합니다. 오늘의 혜택: 두 가지 상품을 구매하시면 세 번째 상품이 무료입니다.', labels: ['상품 1','상품 2','상품 3'], trigger: 10 },
  'ar-SA': { text: 'مرحباً بكم في بيبا بوتيك. عرضنا اليوم: اشترِ قطعتين واحصل على الثالثة مجاناً. يمكنك اختيار أي تشكيلة تريدها.', labels: ['قطعة 1','قطعة 2','قطعة 3'], trigger: 8 },
  'nl-NL': { text: 'Welkom bij Biba Boutique. Onze aanbieding van vandaag: koop twee artikelen en het derde is gratis. U kunt elke combinatie kiezen die u wilt.', labels: ['Artikel 1','Artikel 2','Artikel 3'], trigger: 13 },
  'he-IL': { text: 'ברוכים הבאים ל-Biba Boutique. המבצע שלנו: קנו שני פריטים וקבלו את השלישי חינם. אתם יכולים לבחור כל שילוב שתרצו.', labels: ['פריט 1','פריט 2','פריט 3'], trigger: 9 },
};

const synth = window.speechSynthesis;
let timers = [];
let currentLang = null;

function goMessage(lang) {
  currentLang = lang;
  document.getElementById('screen1').classList.add('hidden');
  document.getElementById('screen2').classList.remove('hidden');
  startMessage(lang);
}

function startMessage(lang) {
  timers.forEach(clearTimeout);
  timers = [];
  synth.cancel();

  const data = messages[lang];
  const words = data.text.split(' ');
  const container = document.getElementById('msgText');
  const dots = document.getElementById('speakDots');
  const graphic = document.getElementById('graphic');

  graphic.classList.remove('visible');
  container.innerHTML = '';
  document.getElementById('lbl1').textContent = data.labels[0];
  document.getElementById('lbl2').textContent = data.labels[1];
  document.getElementById('lbl3').textContent = data.labels[2];

  words.forEach((w, i) => {
    const span = document.createElement('span');
    span.className = 'word';
    span.textContent = w + ' ';
    span.id = 'w' + i;
    container.appendChild(span);
  });

  const utter = new SpeechSynthesisUtterance(data.text);
  utter.lang = lang;
  utter.rate = 0.88;
  utter.pitch = 1.05;
  const voices = synth.getVoices();
  const voice = voices.find(v => v.lang === lang) || voices.find(v => v.lang.startsWith(lang.split('-')[0]));
  if (voice) utter.voice = voice;
  dots.classList.add('visible');
  utter.onend = utter.onerror = () => dots.classList.remove('visible');
  synth.speak(utter);

  words.forEach((_, i) => {
    const t = setTimeout(() => {
      document.getElementById('w' + i)?.classList.add('visible');
      if (i === data.trigger) graphic.classList.add('visible');
    }, i * 210);
    timers.push(t);
  });
}

function replayMsg() { if (currentLang) startMessage(currentLang); }

function goBack() {
  synth.cancel();
  timers.forEach(clearTimeout);
  document.getElementById('screen2').classList.add('hidden');
  document.getElementById('screen1').classList.remove('hidden');
}

if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = () => synth.getVoices();
synth.getVoices();
</script>

</body>
</html>
