<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Biba Boutique</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8D08A;
    --cream: #FAF6EE;
    --dark: #1A1208;
    --mid: #3D2B0A;
  }

  body {
    min-height: 100vh;
    background: var(--dark);
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.10) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(61,43,10,0.8) 0%, var(--dark) 70%);
    z-index: 0;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    padding: 40px 24px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  /* Header */
  .logo-area {
    text-align: center;
    animation: fadeDown 0.8s ease both;
  }

  .logo-area .brand {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.12em;
    line-height: 1;
  }

  .logo-area .sub {
    font-size: 0.65rem;
    color: var(--gold-light);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-top: 6px;
    opacity: 0.7;
  }

  .divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto;
    animation: fadeDown 0.8s 0.1s ease both;
  }

  /* Instruction */
  .instruction {
    text-align: center;
    animation: fadeDown 0.8s 0.2s ease both;
  }

  .instruction p {
    font-size: 0.75rem;
    color: var(--gold-light);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.8;
  }

  /* Language grid */
  .lang-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
    animation: fadeUp 0.8s 0.3s ease both;
  }

  .lang-btn {
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 12px;
    padding: 18px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.25s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    aspect-ratio: 1 / 1;
  }

  .lang-btn:active, .lang-btn.active {
    background: rgba(201,168,76,0.18);
    border-color: var(--gold);
    transform: scale(0.97);
  }

  .lang-btn .flag {
    width: 70%;
    height: auto;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    border-radius: 4px;
    display: block;
  }

  .lang-btn .label {
    display: none;
  }

  /* Player area */
  .player {
    width: 100%;
    background: rgba(201,168,76,0.05);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 16px;
    padding: 28px 24px;
    text-align: center;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    animation: fadeUp 0.8s 0.4s ease both;
  }

  .player.hidden { display: none; }

  .offer-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    color: var(--cream);
    line-height: 1.6;
    font-style: italic;
  }

  .play-btn {
    background: var(--gold);
    color: var(--dark);
    border: none;
    border-radius: 50px;
    padding: 12px 32px;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .play-btn:active { transform: scale(0.96); background: var(--gold-light); }

  .speaking-indicator {
    display: none;
    align-items: center;
    gap: 6px;
  }
  .speaking-indicator.visible { display: flex; }
  .speaking-indicator span {
    display: inline-block;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse 0.6s infinite alternate;
  }
  .speaking-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .speaking-indicator span:nth-child(3) { animation-delay: 0.4s; }

  /* Idle state */
  .idle-text {
    font-size: 0.75rem;
    color: rgba(201,168,76,0.5);
    letter-spacing: 0.1em;
    text-align: center;
    animation: fadeUp 0.8s 0.5s ease both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    from { transform: scaleY(0.5); opacity: 0.4; }
    to { transform: scaleY(1.8); opacity: 1; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="logo-area">
    <div class="brand">BIBA</div>
    <div class="sub">Boutique</div>
  </div>

  <div class="divider"></div>

  <div class="instruction">
    <p>Seleziona la tua lingua &nbsp;·&nbsp; Select your language</p>
  </div>

  <div class="lang-grid">
    <button class="lang-btn" data-lang="it-IT" onclick="speak('it-IT')"><img class="flag" src="https://flagcdn.com/w80/it.png" alt="Italiano"></button>
    <button class="lang-btn" data-lang="en-GB" onclick="speak('en-GB')"><img class="flag" src="https://flagcdn.com/w80/gb.png" alt="English"></button>
    <button class="lang-btn" data-lang="fr-FR" onclick="speak('fr-FR')"><img class="flag" src="https://flagcdn.com/w80/fr.png" alt="Français"></button>
    <button class="lang-btn" data-lang="de-DE" onclick="speak('de-DE')"><img class="flag" src="https://flagcdn.com/w80/de.png" alt="Deutsch"></button>
    <button class="lang-btn" data-lang="es-ES" onclick="speak('es-ES')"><img class="flag" src="https://flagcdn.com/w80/es.png" alt="Español"></button>
    <button class="lang-btn" data-lang="pt-PT" onclick="speak('pt-PT')"><img class="flag" src="https://flagcdn.com/w80/pt.png" alt="Português"></button>
    <button class="lang-btn" data-lang="ru-RU" onclick="speak('ru-RU')"><img class="flag" src="https://flagcdn.com/w80/ru.png" alt="Русский"></button>
    <button class="lang-btn" data-lang="zh-CN" onclick="speak('zh-CN')"><img class="flag" src="https://flagcdn.com/w80/cn.png" alt="中文"></button>
    <button class="lang-btn" data-lang="ja-JP" onclick="speak('ja-JP')"><img class="flag" src="https://flagcdn.com/w80/jp.png" alt="日本語"></button>
    <button class="lang-btn" data-lang="ko-KR" onclick="speak('ko-KR')"><img class="flag" src="https://flagcdn.com/w80/kr.png" alt="한국어"></button>
    <button class="lang-btn" data-lang="ar-SA" onclick="speak('ar-SA')"><img class="flag" src="https://flagcdn.com/w80/sa.png" alt="العربية"></button>
    <button class="lang-btn" data-lang="nl-NL" onclick="speak('nl-NL')"><img class="flag" src="https://flagcdn.com/w80/nl.png" alt="Nederlands"></button>
    <button class="lang-btn" data-lang="he-IL" onclick="speak('he-IL')"><img class="flag" src="https://flagcdn.com/w80/il.png" alt="עברית"></button>
  </div>

  <div class="player hidden" id="player">
    <div class="offer-text" id="offerText"></div>
    <div class="speaking-indicator" id="speakingIndicator">
      <span></span><span></span><span></span>
    </div>
    <button class="play-btn" id="replayBtn" onclick="replayLast()">▶ Replay</button>
  </div>

  <div class="idle-text" id="idleText">
    ☝️ Tocca la tua bandiera per ascoltare l'offerta
  </div>

</div>

<script>
const messages = {
  'it-IT': 'Benvenuto in Biba Boutique. La nostra offerta di oggi è: acquista due articoli e il terzo è completamente gratuito. Puoi decidere la combinazione a tuo piacimento. Chiedi alla nostra assistente per maggiori informazioni.',
  'en-GB': 'Welcome to Biba Boutique. Our offer today is: buy two items and get the third one completely free. You can choose any combination you like. Ask our assistant for more information.',
  'fr-FR': 'Bienvenue chez Biba Boutique. Notre offre du jour : achetez deux articles et le troisième est entièrement gratuit. Vous pouvez choisir la combinaison à votre convenance. Demandez à notre assistante pour plus d\'informations.',
  'de-DE': 'Willkommen bei Biba Boutique. Unser heutiges Angebot: Kaufen Sie zwei Artikel und erhalten Sie den dritten völlig kostenlos. Sie können die Kombination frei wählen. Fragen Sie unsere Mitarbeiterin für weitere Informationen.',
  'es-ES': 'Bienvenido a Biba Boutique. Nuestra oferta de hoy: compra dos artículos y el tercero es completamente gratis. Puedes elegir la combinación que prefieras. Pregunta a nuestra asistente para más información.',
  'pt-PT': 'Bem-vindo à Biba Boutique. A nossa oferta de hoje: compre dois artigos e o terceiro é completamente gratuito. Pode escolher a combinação que preferir. Pergunte à nossa assistente para mais informações.',
  'ru-RU': 'Добро пожаловать в Biba Boutique. Наше предложение сегодня: купите два товара и третий совершенно бесплатно. Вы можете выбрать любую комбинацию. Спросите нашего консультанта для получения дополнительной информации.',
  'zh-CN': '欢迎来到Biba Boutique。我们今天的优惠：购买任意两件商品，第三件完全免费。您可以自由选择任意组合。如需更多信息，请询问我们的助理。',
  'ja-JP': 'ビバ・ブティックへようこそ。本日の特別なご案内：お好きな商品を2点お選びいただくと、3点目が無料になります。組み合わせはお客様のお好みでお選びください。スタッフにお気軽にお声がけください。',
  'ko-KR': 'Biba Boutique에 오신 것을 환영합니다. 오늘의 특별 혜택: 두 가지 상품을 구매하시면 세 번째 상품이 무료입니다. 원하시는 조합을 자유롭게 선택하실 수 있습니다. 직원에게 문의해 주세요.',
  'ar-SA': 'مرحباً بكم في بيبا بوتيك. عرضنا اليوم: اشترِ قطعتين واحصل على الثالثة مجاناً. يمكنك اختيار أي تشكيلة تريدها. اسأل مساعدتنا للمزيد من المعلومات.',
  'nl-NL': 'Welkom bij Biba Boutique. Onze aanbieding van vandaag: koop twee artikelen en krijg het derde gratis. U kunt elke combinatie kiezen die u wilt. Vraag onze medewerker voor meer informatie.',
  'he-IL': 'ברוכים הבאים ל-Biba Boutique. המבצע שלנו היום: קנו שני פריטים וקבלו את השלישי חינם. אתם יכולים לבחור כל שילוב שתרצו. שאלו את הנציגה שלנו לפרטים נוספים.'
};

let lastLang = null;
let synth = window.speechSynthesis;

function speak(lang) {
  synth.cancel();
  lastLang = lang;

  // Highlight active button
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-lang="${lang}"]`)?.classList.add('active');

  const text = messages[lang];

  // Show player
  const player = document.getElementById('player');
  const offerText = document.getElementById('offerText');
  const indicator = document.getElementById('speakingIndicator');
  const idleText = document.getElementById('idleText');
  const replayBtn = document.getElementById('replayBtn');

  player.classList.remove('hidden');
  offerText.textContent = text;
  idleText.style.display = 'none';

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = lang;
  utter.rate = 0.92;
  utter.pitch = 1.05;

  // Try to find a matching voice
  const voices = synth.getVoices();
  const match = voices.find(v => v.lang === lang) ||
                 voices.find(v => v.lang.startsWith(lang.split('-')[0]));
  if (match) utter.voice = match;

  indicator.classList.add('visible');
  replayBtn.style.display = 'none';

  utter.onend = () => {
    indicator.classList.remove('visible');
    replayBtn.style.display = '';
  };
  utter.onerror = () => {
    indicator.classList.remove('visible');
    replayBtn.style.display = '';
  };

  synth.speak(utter);
}

function replayLast() {
  if (lastLang) speak(lastLang);
}

// Preload voices
if (synth.onvoiceschanged !== undefined) {
  synth.onvoiceschanged = () => synth.getVoices();
}
synth.getVoices();

// Auto-detect browser language on load
window.addEventListener('load', () => {
  const browserLang = navigator.language || navigator.userLanguage || 'en-GB';
  const langCode = browserLang.split('-')[0];
  const match = Object.keys(messages).find(k => k.startsWith(langCode));
  if (match) {
    setTimeout(() => speak(match), 800);
  }
});
</script>
</body>
</html>
