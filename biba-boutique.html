<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Biba Boutique</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg:       #3C2A1A;
–bg-card:  rgba(255,255,255,0.04);
–gold:     #C9A84C;
–gold2:    #E8D49A;
–cream:    #F5EDD8;
–muted:    rgba(232,212,154,0.55);
–border:   rgba(201,168,76,0.25);
}

html, body {
min-height: 100%;
background: var(–bg);
font-family: ‘Montserrat’, sans-serif;
color: var(–cream);
overflow-x: hidden;
}

/* ─── SCREENS ─────────────────────────────── */
.screen {
position: fixed;
inset: 0;
background: var(–bg);
z-index: 1;
display: flex;
flex-direction: column;
align-items: center;
overflow-y: auto;
padding: 48px 28px 64px;
transition: opacity 0.45s ease, transform 0.45s ease;
}
.screen.hidden {
opacity: 0;
pointer-events: none;
transform: translateY(18px);
}

/* ─── HEADER ───────────────────────────────── */
.header { text-align: center; margin-bottom: 6px; }

.logo-img {
width: 200px;
max-width: 70vw;
display: block;
margin: 0 auto;
}

/* ─── SCREEN 1: LANGUAGES ──────────────────── */
#screen1 { gap: 0; }

.choose {
font-size: 0.75rem;
font-weight: 400;
letter-spacing: 0.25em;
text-transform: uppercase;
color: var(–gold2);
margin: 22px 0 20px;
text-align: center;
width: 100%;
}

.lang-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 10px;
width: 100%;
max-width: 400px;
}

.lang-btn {
background: var(–bg-card);
border: 1px solid var(–border);
border-radius: 10px;
padding: 14px 6px;
display: flex;
flex-direction: column;
align-items: center;
gap: 7px;
cursor: pointer;
transition: background 0.2s, border-color 0.2s, transform 0.15s;
-webkit-tap-highlight-color: transparent;
}
.lang-btn:active {
background: rgba(201,168,76,0.12);
border-color: var(–gold);
transform: scale(0.96);
}
.lang-btn .flag { font-size: 2rem; line-height: 1; }
.lang-btn .label {
font-size: 0.52rem;
font-weight: 400;
letter-spacing: 0.18em;
text-transform: uppercase;
color: var(–muted);
}

/* ─── SCREEN 2: MESSAGE ────────────────────── */
#screen2 { gap: 22px; padding-top: 42px; }

.msg-card {
width: 100%;
max-width: 420px;
border: 1px solid var(–border);
border-radius: 14px;
padding: 30px 26px;
position: relative;
}
.msg-card::before, .msg-card::after {
content: ‘✦’;
position: absolute;
color: var(–gold);
font-size: 0.6rem;
opacity: 0.5;
}
.msg-card::before { top: 10px; left: 14px; }
.msg-card::after  { bottom: 10px; right: 14px; }

.msg-text {
font-family: ‘Cormorant Garamond’, serif;
font-style: italic;
font-weight: 300;
font-size: 1.35rem;
color: var(–cream);
line-height: 1.9;
text-align: center;
}
.word { display: inline; opacity: 0; transition: opacity 0.2s ease; }
.word.visible { opacity: 1; }

/* speaking dots */
.dots { display: none; align-items: center; justify-content: center; gap: 5px; height: 18px; }
.dots.on { display: flex; }
.dots span {
width: 4px; height: 4px; border-radius: 50%;
background: var(–gold);
animation: blink 0.7s infinite alternate;
}
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
from { opacity: 0.2; transform: scaleY(0.6); }
to   { opacity: 1;   transform: scaleY(1.6); }
}

/* ─── 2 + 1 GRAPHIC ─────────────────────────── */
.offer-graphic {
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
opacity: 0;
transform: translateY(16px);
transition: opacity 0.7s ease, transform 0.7s ease;
width: 100%;
max-width: 380px;
}
.offer-graphic.visible { opacity: 1; transform: translateY(0); }

.offer-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }

.offer-box {
width: 76px; height: 76px;
border: 1px solid var(–border);
border-radius: 12px;
display: flex; align-items: center; justify-content: center;
font-size: 2rem;
background: rgba(201,168,76,0.06);
position: relative;
}
.offer-box.free-box {
border-color: #5CB85C;
background: rgba(92,184,92,0.08);
}
.item-blink {
animation: itemPop 0.5s ease forwards;
}
@keyframes itemPop {
0%   { transform: scale(1);    box-shadow: none; }
40%  { transform: scale(1.18); box-shadow: 0 0 18px rgba(201,168,76,0.7); }
70%  { transform: scale(0.95); }
100% { transform: scale(1);    box-shadow: 0 0 10px rgba(201,168,76,0.35); }
}
.free-blink {
animation: itemPop 0.5s ease forwards;
}
@keyframes freePop {
0%   { transform: scale(1);    box-shadow: none; }
40%  { transform: scale(1.18); box-shadow: 0 0 22px rgba(92,184,92,0.8); }
70%  { transform: scale(0.95); }
100% { transform: scale(1);    box-shadow: 0 0 12px rgba(92,184,92,0.5); }
}
.free-box.free-blink {
animation: freePop 0.5s ease forwards;
}
.free-tag {
position: absolute;
top: -11px; right: -8px;
background: #5CB85C;
color: #fff;
font-size: 0.42rem;
font-weight: 500;
letter-spacing: 0.12em;
padding: 3px 7px;
border-radius: 20px;
font-family: ‘Montserrat’, sans-serif;
}
.offer-label {
font-size: 0.5rem;
font-weight: 400;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(–muted);
}

.op-symbol {
font-family: ‘Cormorant Garamond’, serif;
font-size: 1.8rem;
font-weight: 300;
color: var(–gold);
margin-top: -18px;
line-height: 1;
}

/* ─── BUTTONS ────────────────────────────────── */
.btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

.btn-primary {
background: var(–gold);
color: #2A1A08;
border: none;
border-radius: 40px;
padding: 13px 32px;
font-family: ‘Montserrat’, sans-serif;
font-size: 0.58rem;
font-weight: 500;
letter-spacing: 0.25em;
text-transform: uppercase;
cursor: pointer;
-webkit-tap-highlight-color: transparent;
transition: opacity 0.2s;
}
.btn-primary:active { opacity: 0.8; }

.btn-ghost {
background: transparent;
color: var(–muted);
border: 1px solid var(–border);
border-radius: 40px;
padding: 13px 32px;
font-family: ‘Montserrat’, sans-serif;
font-size: 0.58rem;
font-weight: 400;
letter-spacing: 0.25em;
text-transform: uppercase;
cursor: pointer;
-webkit-tap-highlight-color: transparent;
transition: border-color 0.2s, color 0.2s;
}
.btn-ghost:active { border-color: var(–gold); color: var(–gold); }
</style>

</head>

  'ja-JP': { text: 'ビバ・ブティックへようこそ。本日の特別なご案内：お好きな商品を2点お選びいただくと、3点目が無料になります。', labels: ['商品1','商品2','商品3'], trigger: 8 },
  'ko-KR': { text: 'Biba Boutique에 오신 것을 환영합니다. 오늘의 혜택: 두 가지 상품을 구매하시면 세 번째 상품이 무료입니다.', labels: ['상품 1','상품 2','상품 3'], trigger: 10 },
  'ar-SA': { text: 'مرحباً بكم في بيبا بوتيك. عرضنا اليوم: اشترِ قطعتين واحصل على الثالثة مجاناً. يمكنك اختيار أي تشكيلة تريدها.', labels: ['قطعة 1','قطعة 2','قطعة 3'], trigger: 8 },
  'nl-NL': { text: 'Welkom bij Biba Boutique. Onze aanbieding van vandaag: koop twee artikelen en het derde is gratis. U kunt elke combinatie kiezen die u wilt.', labels: ['Artikel 1','Artikel 2','Artikel 3'], trigger: 13 },
  'he-IL': { text: 'ברוכים הבאים ל-Biba Boutique. המבצע שלנו: קנו שני פריטים וקבלו את השלישי חינם. אתם יכולים לבחור כל שילוב שתרצו.', labels: ['פריט 1','פריט 2','פריט 3'], trigger: 9 },
  'pl-PL': { text: 'Witamy w Biba Boutique. Nasza dzisiejsza oferta: kup dwa artykuły, a trzeci otrzymasz całkowicie za darmo. Możesz wybrać dowolną kombinację.', labels: ['Artykuł 1','Artykuł 2','Artykuł 3'], trigger: 14 },
  'hr-HR': { text: 'Dobrodošli u Biba Boutique. Naša ponuda danas: kupite dva artikla i treći je potpuno besplatan. Možete odabrati bilo koju kombinaciju.', labels: ['Artikl 1','Artikl 2','Artikl 3'], trigger: 13 },
};

const synth = window.speechSynthesis;
let timers = [], currentLang = null;

// CJK languages: split into short chunks; others: split by space
function getChunks(text, lang) {
  if (['zh-CN','ja-JP','ko-KR'].includes(lang)) {
    // Split into groups of ~4 characters
    return text.match(/.{1,4}/g) || [text];
  }
  return text.split(' ');
}

// Avg ms per chunk based on language and rate 0.88
function chunkDelay(lang) {
  const map = {
    'zh-CN': 380, 'ja-JP': 380, 'ko-KR': 340,
    'ar-SA': 280, 'he-IL': 270, 'ru-RU': 240,
    'de-DE': 260, 'nl-NL': 250,
  };
  return map[lang] || 220;
}

function goMessage(lang) {
  currentLang = lang;
  document.getElementById('screen1').classList.add('hidden');
  document.getElementById('screen2').classList.remove('hidden');
  startMessage(lang);
}

function startMessage(lang) {
  timers.forEach(clearTimeout); timers = [];
  synth.cancel();

  const data = messages[lang];
  const chunks = getChunks(data.text, lang);
  const container = document.getElementById('msgText');
  const dots = document.getElementById('dots');
  const graphic = document.getElementById('graphic');

  graphic.classList.remove('visible');
  container.innerHTML = '';
  document.getElementById('lbl1').textContent = data.labels[0];
  document.getElementById('lbl2').textContent = data.labels[1];
  document.getElementById('lbl3').textContent = data.labels[2];

  const sep = ['zh-CN','ja-JP','ko-KR'].includes(lang) ? '' : ' ';
  chunks.forEach((w, i) => {
    const s = document.createElement('span');
    s.className = 'word';
    s.textContent = w + sep;
    s.id = 'w' + i;
    container.appendChild(s);
  });

  const utter = new SpeechSynthesisUtterance(data.text);
  utter.lang = lang; utter.rate = 0.88; utter.pitch = 1.05;
  const voices = synth.getVoices();
  const voice = voices.find(v => v.lang === lang) || voices.find(v => v.lang.startsWith(lang.split('-')[0]));
  if (voice) utter.voice = voice;
  dots.classList.add('on');
  utter.onend = () => {
    dots.classList.remove('on');
    triggerSequentialBlink();
  };
  utter.onerror = () => dots.classList.remove('on');

  // Use boundary events as primary; fallback timer activates only if no boundary fires
  let boundaryFired = false;
  let wordIndex = 0;

  utter.onboundary = (e) => {
    if (e.name !== 'word') return;
    boundaryFired = true;
    // clear timer fallback since boundary is working
    timers.forEach(clearTimeout); timers = [];
    document.getElementById('w' + wordIndex)?.classList.add('visible');
    if (wordIndex >= data.trigger) graphic.classList.add('visible');
    wordIndex++;
  };

  synth.speak(utter);

  // Fallback: activate after 600ms if no boundary event fired
  const fallbackStart = setTimeout(() => {
    if (!boundaryFired) {
      const delay = chunkDelay(lang);
      chunks.forEach((_, i) => {
        const t = setTimeout(() => {
          document.getElementById('w' + i)?.classList.add('visible');
          if (i >= data.trigger) graphic.classList.add('visible');
        }, i * delay);
        timers.push(t);
      });
    }
  }, 600);
  timers.push(fallbackStart);
}

function triggerSequentialBlink() {
  const boxes = document.querySelectorAll('.offer-box');
  if (!boxes.length) return;
  const total = 5;
  const cycleMs = 1400; // duration of one full cycle
  for (let r = 0; r < total; r++) {
    const base = r * cycleMs;
    setTimeout(() => {
      boxes[0].classList.remove('item-blink'); void boxes[0].offsetWidth;
      boxes[0].classList.add('item-blink');
    }, base + 200);
    setTimeout(() => {
      boxes[1].classList.remove('item-blink'); void boxes[1].offsetWidth;
      boxes[1].classList.add('item-blink');
    }, base + 650);
    setTimeout(() => {
      boxes[2].classList.remove('item-blink','free-blink'); void boxes[2].offsetWidth;
      boxes[2].classList.add('free-blink');
    }, base + 1100);
  }
}

function replayMsg() { if (currentLang) startMessage(currentLang); }

function goBack() {
  synth.cancel();
  timers.forEach(clearTimeout);
  document.getElementById('screen2').classList.add('hidden');
  document.getElementById('screen1').classList.remove('hidden');
}

if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = () => synth.getVoices();
synth.getVoices();
</script>
