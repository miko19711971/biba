<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iconic Scarf Knots</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #060606;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 0 20px;
    font-family: 'Segoe UI', sans-serif;
    overflow-x: hidden;
    overflow-y: auto;
  }

  /* ── Outer wrapper — va in fullscreen ── */
  #player {
    position: relative;
    width: min(92vw, 860px);
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.07),
      0 30px 80px rgba(0,0,0,0.95);
  }
  #player:-webkit-full-screen { width:100%; max-width:100%; border-radius:0; }
  #player:fullscreen           { width:100%; max-width:100%; border-radius:0; }

  /* ── Video — NO controlli nativi ── */
  video {
    width: 100%;
    display: block;
    background: #000;
    cursor: pointer;
  }

  /* ── Replay overlay button ── */
  #replay-btn {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    width: 52px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 9px;
    padding: 20px 0;
    background: rgba(10,10,10,0.70);
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 28px;
    cursor: pointer;
    color: #c8c8c8;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: all 0.22s ease;
    box-shadow: 0 8px 30px rgba(0,0,0,0.6);
    z-index: 10;
    user-select: none;
  }
  #replay-btn:hover {
    background: rgba(255,255,255,0.13);
    border-color: rgba(255,255,255,0.35);
    color: #fff;
    transform: translateY(calc(-50% - 3px));
  }
  #replay-btn:active { transform: translateY(-50%); }
  #replay-btn svg { width:22px; height:22px; fill:currentColor; }
  #replay-btn .btn-label {
    font-size: 7.5px;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    color: rgba(255,255,255,0.35);
    white-space: nowrap;
    transition: color 0.2s;
  }
  #replay-btn:hover .btn-label { color: rgba(255,255,255,0.65); }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(-360deg); }
  }
  .spinning { animation: spin 0.42s cubic-bezier(.4,0,.2,1) forwards; }

  /* ── Play/pause overlay (centro) ── */
  #play-overlay {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 64px; height: 64px;
    background: rgba(0,0,0,0.55);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font-size: 28px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    z-index: 9;
  }
  #play-overlay.show { opacity: 1; }

  /* ── Barra controlli custom ── */
  #controls {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    background: #0d0d0d;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  /* Play/pause button */
  #play-btn {
    background: none;
    border: none;
    color: #ccc;
    font-size: 18px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
    line-height: 1;
  }
  #play-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }

  /* Knot name */
  #knot-name {
    flex: 1;
    color: rgba(255,255,255,0.85);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    min-width: 0;
  }

  /* Progress bar */
  #progress-wrap {
    flex: 2;
    height: 4px;
    background: rgba(255,255,255,0.12);
    border-radius: 4px;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
  }
  #progress-fill {
    height: 100%;
    background: rgba(255,255,255,0.7);
    border-radius: 4px;
    width: 0%;
    pointer-events: none;
    transition: width 0.1s linear;
  }
  #progress-wrap:hover #progress-fill { background: #fff; }

  /* Time */
  #time {
    color: rgba(255,255,255,0.4);
    font-size: 10px;
    letter-spacing: 0.5px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  /* Volume */
  #vol-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.5);
    font-size: 15px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 5px;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  #vol-btn:hover { color: #fff; }

  /* Fullscreen */
  #fs-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.55);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  #fs-btn:hover { background: rgba(255,255,255,0.1); color:#fff; border-color:rgba(255,255,255,0.35); }

  /* ── Email section ── */
  #email-section {
    margin-top: 14px;
    width: min(92vw, 860px);
    background: linear-gradient(160deg, #111 0%, #0d0d0d 100%);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 18px 32px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.7);
    text-align: center;
  }

  #email-section .tagline {
    color: rgba(255,255,255,0.35);
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  #email-section h3 {
    color: rgba(255,255,255,0.88);
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.5px;
    margin-bottom: 14px;
  }

  .email-row {
    display: flex;
    gap: 10px;
    max-width: 420px;
    margin: 0 auto;
  }

  #email-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 12px 16px;
    color: #fff;
    font-size: 13px;
    font-family: 'Segoe UI', sans-serif;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  #email-input::placeholder { color: rgba(255,255,255,0.25); }
  #email-input:focus {
    border-color: rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.08);
  }

  #send-btn {
    background: rgba(255,255,255,0.92);
    color: #0a0a0a;
    border: none;
    border-radius: 10px;
    padding: 12px 22px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #send-btn:hover { background: #fff; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,255,255,0.15); }
  #send-btn:active { transform: translateY(0); }
  #send-btn:disabled { opacity: 0.45; cursor: default; transform: none; }

  #email-status {
    margin-top: 14px;
    font-size: 12px;
    min-height: 18px;
    transition: opacity 0.3s;
  }
  #email-status.ok  { color: #7ecf9a; }
  #email-status.err { color: #e07c7c; }

  #email-section .privacy {
    margin-top: 14px;
    color: rgba(255,255,255,0.18);
    font-size: 9.5px;
    letter-spacing: 0.3px;
  }

  #link-reveal {
    display: none;
    margin-top: 18px;
    padding: 14px 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
  }
  #link-reveal p {
    color: rgba(255,255,255,0.45);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  #link-reveal a {
    color: rgba(255,255,255,0.85);
    font-size: 12px;
    word-break: break-all;
    text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    transition: color 0.15s, border-color 0.15s;
  }
  #link-reveal a:hover { color: #fff; border-color: rgba(255,255,255,0.5); }

  /* ── Paywall overlay ── */
  #paywall {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 30;
    text-align: center;
    padding: 28px 24px;
  }
  #paywall.show { display: flex; }

  #paywall .lock {
    font-size: 36px;
    margin-bottom: 16px;
    opacity: 0.9;
  }

  #paywall h2 {
    color: #fff;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  #paywall p {
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    line-height: 1.7;
    max-width: 280px;
    margin-bottom: 22px;
  }

  #paywall-btn {
    background: rgba(255,255,255,0.92);
    color: #0a0a0a;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  #paywall-btn:hover { background: #fff; transform: translateY(-1px); }
</style>
</head>
<body>

<div id="player">

  <video id="vid" playsinline>
    <source src="VIDEO_PREMIUM_SYNC_FIXED.mp4" type="video/mp4">
  </video>

  <!-- Paywall overlay -->
  <div id="paywall">
    <div class="lock">🔒</div>
    <h2>Preview Ended</h2>
    <p>Enter your email below to receive your personal link and watch the full video anytime, on any device.</p>
    <button id="paywall-btn" onclick="document.getElementById('email-section').scrollIntoView({behavior:'smooth'})">
      Get My Link
    </button>
  </div>

  <!-- Play/pause feedback al centro -->
  <div id="play-overlay">▶</div>

  <!-- Replay capsule -->
  <button id="replay-btn" title="Replay this knot">
    <svg id="ri" viewBox="0 0 24 24">
      <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6
               -6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
    </svg>
    <span class="btn-label">Replay</span>
  </button>

  <!-- Barra controlli -->
  <div id="controls">
    <button id="play-btn">▶</button>
    <div id="knot-name">—</div>
    <div id="progress-wrap">
      <div id="progress-fill"></div>
    </div>
    <div id="time">0:00</div>
    <button id="vol-btn">🔊</button>
    <button id="fs-btn">⛶</button>
  </div>

</div>

<!-- Email capture section -->
<div id="email-section">
  <div class="tagline">Iconic Scarf Knots</div>
  <h3>Ricevi il link del video su tutti i tuoi dispositivi</h3>
  <div class="email-row">
    <input type="email" id="email-input" placeholder="La tua email...">
    <button id="send-btn">Invia Link</button>
  </div>
  <div id="email-status"></div>
  <div id="link-reveal">
    <p>Il tuo link</p>
    <a id="link-anchor" href="#" target="_blank"></a>
  </div>
  <div class="privacy">Nessuno spam. Solo il link che hai richiesto.</div>
</div>

<script>
// ── Access control ───────────────────────────────────────────────────
const ACCESS_TOKEN = 'BibaBoutiqueRome2024';
const urlParams    = new URLSearchParams(window.location.search);
if (urlParams.get('access') === ACCESS_TOKEN) {
  localStorage.setItem('biba_access', ACCESS_TOKEN);
}
const fullAccess = localStorage.getItem('biba_access') === ACCESS_TOKEN;

if (!fullAccess) {
  // Start 10-minute preview countdown
  const expireAt = Date.now() + 10 * 60 * 1000;
  const previewTimer = setInterval(() => {
    if (Date.now() >= expireAt) {
      clearInterval(previewTimer);
      document.getElementById('vid').pause();
      document.getElementById('paywall').classList.add('show');
      setTimeout(() => {
        document.getElementById('email-section').scrollIntoView({ behavior: 'smooth' });
      }, 800);
    }
  }, 1000);
}

const vid          = document.getElementById('vid');
vid.playbackRate   = 0.75;
const player       = document.getElementById('player');
const playBtn      = document.getElementById('play-btn');
const playOverlay  = document.getElementById('play-overlay');
const knotName     = document.getElementById('knot-name');
const progressWrap = document.getElementById('progress-wrap');
const progressFill = document.getElementById('progress-fill');
const timeEl       = document.getElementById('time');
const volBtn       = document.getElementById('vol-btn');
const fsBtn        = document.getElementById('fs-btn');
const replayBtn    = document.getElementById('replay-btn');
const ri           = document.getElementById('ri');

// ── Knot segments ────────────────────────────────────────────────────
const KNOTS = [
  { name: "Diana Drop",      start:  0,     end:  9.5   },
  { name: "Gong Li Knot",   start:  9.5,   end: 20.75  },
  { name: "Grace Tie",      start: 20.75,  end: 29.5   },
  { name: "Chanel Square",  start: 29.5,   end: 50.0   },
  { name: "Penelope Knot",  start: 50.0,   end: 62.5   },
  { name: "Pavlova Petal",  start: 62.5,   end: 75.0   },
  { name: "Gal Elegance",   start: 75.0,   end: 85.0   },
  { name: "Jennie Necklace",start: 85.0,   end: 99.938 },
];

function getCurrentKnot() {
  const t = vid.currentTime;
  return KNOTS.find(k => t >= k.start && t < k.end) ?? KNOTS[KNOTS.length-1];
}

function fmt(s) {
  const m = Math.floor(s/60), ss = Math.floor(s%60);
  return `${m}:${ss.toString().padStart(2,'0')}`;
}

// ── Aggiornamento continuo ───────────────────────────────────────────
let lastKnot = null;
vid.addEventListener('timeupdate', () => {
  const k = getCurrentKnot();
  if (k !== lastKnot) {
    knotName.textContent = k.name.toUpperCase();
    lastKnot = k;
  }
  if (vid.duration) {
    progressFill.style.width = (vid.currentTime / vid.duration * 100) + '%';
    timeEl.textContent = fmt(vid.currentTime) + ' / ' + fmt(vid.duration);
  }
});

// ── Play / Pause ─────────────────────────────────────────────────────
function togglePlay() {
  if (vid.paused) { vid.play(); }
  else            { vid.pause(); }
}

vid.addEventListener('click', togglePlay);
playBtn.addEventListener('click', togglePlay);

function flashOverlay(icon) {
  playOverlay.textContent = icon;
  playOverlay.classList.add('show');
  setTimeout(() => playOverlay.classList.remove('show'), 500);
}

vid.addEventListener('play',  () => { playBtn.textContent = '⏸'; flashOverlay('▶'); });
vid.addEventListener('pause', () => { playBtn.textContent = '▶'; flashOverlay('⏸'); });
vid.addEventListener('ended', () => { playBtn.textContent = '▶'; });

// ── Progress bar click ───────────────────────────────────────────────
progressWrap.addEventListener('click', e => {
  const r = progressWrap.getBoundingClientRect();
  vid.currentTime = (e.clientX - r.left) / r.width * vid.duration;
});

// ── Volume mute toggle ───────────────────────────────────────────────
volBtn.addEventListener('click', () => {
  vid.muted = !vid.muted;
  volBtn.textContent = vid.muted ? '🔇' : '🔊';
});

// ── Replay button ────────────────────────────────────────────────────
replayBtn.addEventListener('click', () => {
  const k = getCurrentKnot();
  vid.currentTime = k.start;
  if (vid.paused) vid.play();
  ri.classList.remove('spinning');
  void ri.offsetWidth;
  ri.classList.add('spinning');
  ri.addEventListener('animationend', () => ri.classList.remove('spinning'), { once: true });
});

// ── Fullscreen ───────────────────────────────────────────────────────
fsBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    player.requestFullscreen().catch(() => vid.requestFullscreen());
    fsBtn.textContent = '✕';
  } else {
    document.exitFullscreen();
    fsBtn.textContent = '⛶';
  }
});
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) fsBtn.textContent = '⛶';
});

// ── Keyboard shortcuts ───────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowLeft')  vid.currentTime = Math.max(0, vid.currentTime - 5);
  if (e.code === 'ArrowRight') vid.currentTime = Math.min(vid.duration, vid.currentTime + 5);
});

// ── EmailJS — email capture ──────────────────────────────────────────
(function(){
  emailjs.init('bknKtj-An57LETGGD');

  const emailInput = document.getElementById('email-input');
  const sendBtn    = document.getElementById('send-btn');
  const statusEl   = document.getElementById('email-status');
  const linkReveal = document.getElementById('link-reveal');
  const linkAnchor = document.getElementById('link-anchor');

  const VIDEO_LINK = 'https://miko19711971.github.io/biba/scarf_player.html?access=BibaBoutiqueRome2024';

  sendBtn.addEventListener('click', () => {
    const email = emailInput.value.trim();
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      statusEl.textContent = 'Please enter a valid email address.';
      statusEl.className = 'err';
      return;
    }
    sendBtn.disabled = true;
    statusEl.textContent = 'Sending…';
    statusEl.className = '';

    emailjs.send('service_947xfpv', 'template_8t3hvg7', {
      to_email:   email,
      video_link: VIDEO_LINK,
    })
    .then(() => {
      statusEl.textContent = 'Check your inbox — the link is on its way!';
      statusEl.className = 'ok';
      linkAnchor.href = VIDEO_LINK;
      linkAnchor.textContent = VIDEO_LINK;
      linkReveal.style.display = 'block';
      emailInput.value = '';
      sendBtn.disabled = false;
    })
    .catch((err) => {
      statusEl.textContent = 'Something went wrong. Please try again.';
      statusEl.className = 'err';
      sendBtn.disabled = false;
    });
  });

  emailInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') sendBtn.click();
  });
})();
</script>
</body>
</html>
