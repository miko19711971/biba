<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Your Secret Discount – Biba Boutique</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100vh;
  background:#0a0a0a;
  font-family:'Arial', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  position:relative;
}

/* ambient glow */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(201,168,106,0.10) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(201,168,106,0.07) 0%, transparent 50%);
  pointer-events:none;
}

/* sparkle stars */
.stars{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
.star{
  position:absolute;width:2px;height:2px;border-radius:50%;
  background:#c9a86a;opacity:0;animation:twinkle 3s infinite;
}
@keyframes twinkle{
  0%,100%{opacity:0;transform:scale(0.5)}
  50%{opacity:0.6;transform:scale(1)}
}

/* card */
.card{
  position:relative;
  width:92%;max-width:380px;
  text-align:center;
  padding:36px 28px 32px;
  z-index:1;
  border:1px solid rgba(201,168,106,0.15);
  border-radius:20px;
  background:rgba(255,255,255,0.02);
  backdrop-filter:blur(4px);
}

/* brand */
.brand{
  font-size:10px;
  letter-spacing:6px;
  text-transform:uppercase;
  color:rgba(201,168,106,0.5);
  margin-bottom:28px;
}

/* checkmark */
.check{
  width:56px;height:56px;
  background:rgba(40,167,69,0.15);
  border:2px solid rgba(40,167,69,0.6);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  font-size:26px;
  animation:popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both;
}
@keyframes popIn{
  from{transform:scale(0);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* headline */
.headline{
  font-size:13px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:rgba(255,255,255,0.45);
  margin-bottom:8px;
  font-weight:400;
}

/* discount hero */
.discount{
  font-size:88px;
  font-weight:900;
  line-height:1;
  background:linear-gradient(135deg,#c9a86a 0%,#f0d78a 50%,#c9a86a 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:-2px;
  margin-bottom:4px;
}

/* activated line */
.activated{
  font-size:13px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:rgba(255,255,255,0.45);
  margin-bottom:20px;
}

/* divider */
.divider{
  width:40px;height:1px;
  background:rgba(201,168,106,0.3);
  margin:0 auto 18px;
}

/* applies-to */
.applies{
  font-size:14px;
  color:rgba(255,255,255,0.75);
  letter-spacing:1px;
  line-height:1.7;
  margin-bottom:6px;
}
.applies strong{
  color:#c9a86a;
  font-weight:700;
}

/* location */
.location{
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:rgba(255,255,255,0.2);
  margin-bottom:28px;
}

/* urgency */
.urgency{
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#c0392b;
  margin-bottom:24px;
  font-weight:700;
}

/* token */
.token-wrap{
  display:inline-block;
  border:1px solid rgba(201,168,106,0.3);
  border-radius:8px;
  padding:8px 20px;
  margin-bottom:24px;
}
.token-label{
  font-size:9px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:rgba(255,255,255,0.2);
  margin-bottom:4px;
}
.token-code{
  font-size:16px;
  letter-spacing:5px;
  color:#c9a86a;
  font-weight:700;
  font-family:monospace;
}

/* CTA */
.cta{
  width:100%;
  padding:16px 20px;
  background:#c9a86a;
  color:#0a0a0a;
  border:none;
  border-radius:50px;
  font-size:12px;
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  cursor:pointer;
  transition:all 0.2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  box-shadow:0 6px 30px rgba(201,168,106,0.3);
}
.cta:active{transform:scale(0.97);}
.cta.confirmed{
  background:rgba(40,167,69,0.9);
  color:#fff;
  box-shadow:0 6px 25px rgba(40,167,69,0.4);
  pointer-events:none;
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="card">
  <div class="brand">Biba Boutique · Roma</div>

  <div class="check">✓</div>

  <div class="headline">Your secret discount</div>
  <div class="discount">15%</div>
  <div class="activated">has been activated</div>

  <div class="divider"></div>

  <div class="applies">on <strong>foulards &amp; accessories</strong></div>
  <div class="location">Via delle Muratte 88 · Rome</div>

  <div class="urgency">⏳ Valid today until <span id="close-time">18:45</span></div>

  <div class="token-wrap">
    <div class="token-label">your code</div>
    <div class="token-code" id="discount-code">BIBA-···</div>
  </div>

  <button id="cta-btn" class="cta" onclick="claimOffer()">
    Show this screen at the counter
  </button>
</div>

<script>
var CLOSE_HOUR = 18, CLOSE_MIN = 45;
var GAS = 'https://script.google.com/macros/s/AKfycbx0Qd3zb39OjjG4BhOjX3Ph7h85WIYMGnBm9imZn3tSej54h4YWaAlFjfeIwG400_Jx/exec';

// sparkle stars
(function(){
  var s = document.getElementById('stars');
  for(var i = 0; i < 50; i++){
    var d = document.createElement('div');
    d.className = 'star';
    d.style.left = Math.random()*100+'%';
    d.style.top  = Math.random()*100+'%';
    d.style.animationDelay    = Math.random()*4+'s';
    d.style.animationDuration = (2+Math.random()*3)+'s';
    s.appendChild(d);
  }
})();

function logSheet(token, tipo){
  try{
    fetch(GAS,{
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:token, tipo:tipo, timestamp:new Date().toISOString()})
    });
  }catch(e){}
}

function genToken(){
  var c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789', t = 'BIBA-';
  for(var i = 0; i < 6; i++) t += c[Math.floor(Math.random()*c.length)];
  return t;
}

// countdown
(function(){
  var el = document.getElementById('close-time');
  var closeDate = new Date();
  closeDate.setHours(CLOSE_HOUR, CLOSE_MIN, 0, 0);
  var closeLabel = CLOSE_HOUR + ':' + (CLOSE_MIN < 10 ? '0' : '') + CLOSE_MIN;
  function tick(){
    var diff = Math.max(0, closeDate - new Date());
    var hh = Math.floor(diff / 3600000);
    var mm = Math.floor((diff % 3600000) / 60000);
    if(el){
      if(hh > 0)       el.textContent = closeLabel + ' — ' + hh + 'h ' + mm + 'min left';
      else if(mm > 0)  el.textContent = closeLabel + ' — ' + mm + ' min left!';
      else             el.textContent = closeLabel;
    }
  }
  tick();
  setInterval(tick, 60000);
})();

// token
var token = sessionStorage.getItem('bibaVetrinaToken');
if(!token){
  token = genToken();
  sessionStorage.setItem('bibaVetrinaToken', token);
  logSheet(token, 'vetrina');
}
var el = document.getElementById('discount-code');
if(el) el.textContent = token;

// CTA
function claimOffer(){
  if(sessionStorage.getItem('bibaCassaLogged')) return;
  sessionStorage.setItem('bibaCassaLogged', '1');
  logSheet(token, 'cassa');
  var btn = document.getElementById('cta-btn');
  if(btn){
    btn.classList.add('confirmed');
    btn.textContent = '✅  Discount ready — show to staff';
  }
}
</script>
</body>
</html>
