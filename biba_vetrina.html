<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Secret Offer – Biba Boutique</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100vh;
  background:#0a0a0a;
  font-family:'Arial Black', Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  position:relative;
}

/* sparkle stars */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(circle at 15% 20%, rgba(201,168,106,0.18) 0%, transparent 40%),
    radial-gradient(circle at 85% 75%, rgba(201,168,106,0.12) 0%, transparent 40%);
  pointer-events:none;
}

.stars{
  position:fixed;inset:0;
  pointer-events:none;
  overflow:hidden;
}
.star{
  position:absolute;
  width:3px;height:3px;
  border-radius:50%;
  background:#c9a86a;
  opacity:0;
  animation:twinkle 3s infinite;
}
@keyframes twinkle{
  0%,100%{opacity:0;transform:scale(0.5)}
  50%{opacity:0.8;transform:scale(1)}
}

.container{
  position:relative;
  width:92%;
  max-width:400px;
  text-align:center;
  padding:10px 20px 40px;
  z-index:1;
}

/* gift image */
.gift{
  font-size:100px;
  line-height:1;
  margin-bottom:20px;
  filter:drop-shadow(0 0 30px rgba(201,168,106,0.6));
  animation:float 3s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

.top-text{
  font-size:17px;
  letter-spacing:3px;
  color:#c9a86a;
  text-transform:uppercase;
  margin-bottom:6px;
  font-weight:normal;
  font-family:Arial, sans-serif;
}

.found{
  font-size:28px;
  letter-spacing:4px;
  color:#fff;
  text-transform:uppercase;
  margin-bottom:22px;
  font-family:Arial, sans-serif;
  font-weight:bold;
}

/* main badge */
.badge{
  background:linear-gradient(135deg,#c9a86a 0%,#e8c97a 40%,#c9a86a 100%);
  border-radius:16px;
  padding:18px 20px 14px;
  margin-bottom:14px;
  box-shadow:0 8px 30px rgba(201,168,106,0.4);
  border:2px solid rgba(255,255,255,0.2);
}

.main-offer{
  font-size:60px;
  font-weight:900;
  color:#0a0a0a;
  line-height:1;
  letter-spacing:2px;
  text-shadow:2px 2px 0 rgba(0,0,0,0.2);
}

.free-text{
  font-size:42px;
  font-weight:900;
  color:#0a0a0a;
  letter-spacing:4px;
}

/* extra gift strip */
.extra{
  background:#c0392b;
  border-radius:10px;
  padding:12px 20px;
  margin-bottom:20px;
  box-shadow:0 4px 20px rgba(192,57,43,0.5);
}

.extra-text{
  font-size:22px;
  font-weight:900;
  color:#fff;
  letter-spacing:3px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.diamond{color:#c9a86a;font-size:14px}

/* logo badge */
.logo-badge{
  width:48px;height:48px;
  background:linear-gradient(135deg,#1a1a1a,#333);
  border:2px solid #c9a86a;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;
  font-size:20px;
  font-weight:900;
  color:#c9a86a;
  letter-spacing:0;
}

/* qr visitors */
.qr-line{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin-bottom:28px;
}

.qr-sep{
  flex:1;
  height:1px;
  background:rgba(201,168,106,0.4);
  max-width:70px;
}

.qr-text{
  font-size:12px;
  letter-spacing:3px;
  color:#c9a86a;
  text-transform:uppercase;
  font-family:Arial,sans-serif;
  white-space:nowrap;
}

/* ── Hours / closed overlay ── */
#closed-overlay{
  position:fixed;inset:0;
  background:#0a0a0a;
  z-index:999;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:32px;
}
.closed-icon{font-size:60px;margin-bottom:16px;}
.closed-title{
  font-size:22px;font-weight:900;
  letter-spacing:4px;text-transform:uppercase;
  color:#c9a86a;margin-bottom:12px;
}
.closed-msg{
  font-size:14px;color:rgba(255,255,255,0.55);
  line-height:1.8;letter-spacing:1px;
}
.closed-hours{
  margin-top:20px;
  font-size:20px;font-weight:900;
  color:#fff;letter-spacing:3px;
}

/* ── Urgency bar ── */
#urgency-bar{
  background:linear-gradient(90deg,#c0392b,#e74c3c);
  color:#fff;
  text-align:center;
  font-size:11px;
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  padding:10px;
  margin-bottom:14px;
  border-radius:8px;
  display:none;
}

/* ── CTA confirmed state ── */
.cta.confirmed{
  background:rgba(40,167,69,0.9);
  box-shadow:0 6px 25px rgba(40,167,69,0.5);
  pointer-events:none;
}

/* CTA button */
.cta{
  display:block;
  width:100%;
  padding:18px 20px;
  background:#c0392b;
  color:#fff;
  text-decoration:none;
  border-radius:50px;
  font-size:16px;
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  box-shadow:0 6px 25px rgba(192,57,43,0.5);
  border:none;
  cursor:pointer;
  transition:transform 0.15s,box-shadow 0.15s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.cta:active{
  transform:scale(0.97);
  box-shadow:0 3px 15px rgba(192,57,43,0.4);
}

.cta-icon{font-size:20px}

/* token */
.code-wrap{
  margin-top:22px;
  font-size:11px;
  letter-spacing:2px;
  color:#555;
  text-transform:uppercase;
  font-family:Arial,sans-serif;
}
.code-wrap span{
  display:inline-block;
  margin-top:5px;
  font-size:14px;
  letter-spacing:4px;
  color:#c9a86a;
  font-weight:bold;
}
</style>
</head>
<body>

<!-- Closed overlay -->
<div id="closed-overlay">
  <div class="closed-icon">🕐</div>
  <div class="closed-title">We're Closed</div>
  <div class="closed-msg">Come back during opening hours<br>and scan this QR code again!</div>
  <div class="closed-hours" id="closed-hours-text">Open 10:00 – 20:00</div>
</div>

<!-- sparkle stars -->
<div class="stars" id="stars"></div>

<div class="container">

  <div class="gift">🎁</div>

  <div class="top-text">you found the</div>
  <div class="found">Secret Offer</div>

  <div class="badge">
    <div class="main-offer">2+1</div>
    <div class="free-text">FREE</div>
  </div>

  <div class="extra">
    <div class="extra-text">
      <span class="diamond">✦</span>
      + EXTRA GIFT +
      <span class="diamond">✦</span>
    </div>
  </div>

  <div class="logo-badge">B</div>

  <div id="urgency-bar">⏳ Offer closes at <span id="close-time">20:00</span> — valid today only</div>

  <div class="qr-line">
    <div class="qr-sep"></div>
    <div class="qr-text">Only for QR Visitors</div>
    <div class="qr-sep"></div>
  </div>

  <button id="cta-btn" class="cta" onclick="claimOffer()">
    <span class="cta-icon">📱</span>
    SHOW THIS SCREEN AT THE COUNTER
  </button>

  <div class="code-wrap">
    your code<br>
    <span id="discount-code">BIBA-···</span>
  </div>

</div>

<script>
// ── Configurazione orari (modifica questi valori) ──────────────────────
var OPEN_HOUR  = 10;   // apertura
var CLOSE_HOUR = 20;   // chiusura
// ───────────────────────────────────────────────────────────────────────

var GAS = 'https://script.google.com/macros/s/AKfycbx0Qd3zb39OjjG4BhOjX3Ph7h85WIYMGnBm9imZn3tSej54h4YWaAlFjfeIwG400_Jx/exec';

// sparkle stars
(function(){
  var s=document.getElementById('stars');
  for(var i=0;i<60;i++){
    var d=document.createElement('div');
    d.className='star';
    d.style.left=Math.random()*100+'%';
    d.style.top=Math.random()*100+'%';
    d.style.animationDelay=Math.random()*4+'s';
    d.style.animationDuration=(2+Math.random()*3)+'s';
    s.appendChild(d);
  }
})();

function genToken(){
  var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789', t='BIBA-';
  for(var i=0;i<6;i++) t+=c[Math.floor(Math.random()*c.length)];
  return t;
}

function logSheet(token, tipo){
  try{
    fetch(GAS,{
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:token, tipo:tipo, timestamp:new Date().toISOString()})
    });
  }catch(e){}
}

// Controlla orari apertura
(function checkHours(){
  var now   = new Date();
  var h     = now.getHours();
  var isOpen = h >= OPEN_HOUR && h < CLOSE_HOUR;

  if(!isOpen){
    var overlay = document.getElementById('closed-overlay');
    overlay.style.display = 'flex';
    var txt = document.getElementById('closed-hours-text');
    if(txt) txt.textContent = 'Open ' + OPEN_HOUR + ':00 – ' + CLOSE_HOUR + ':00';
    return;
  }

  // Mostra barra urgenza con conto alla rovescia
  var urgencyBar  = document.getElementById('urgency-bar');
  var closeTimeEl = document.getElementById('close-time');
  if(urgencyBar){
    urgencyBar.style.display = 'block';
    var closeDate = new Date();
    closeDate.setHours(CLOSE_HOUR, 0, 0, 0);
    function updateCountdown(){
      var diff = Math.max(0, closeDate - new Date());
      var hh   = Math.floor(diff / 3600000);
      var mm   = Math.floor((diff % 3600000) / 60000);
      if(closeTimeEl){
        if(hh > 0)
          closeTimeEl.textContent = CLOSE_HOUR + ':00 (' + hh + 'h ' + mm + 'min left)';
        else if(mm > 0)
          closeTimeEl.textContent = CLOSE_HOUR + ':00 (' + mm + ' min left!)';
        else
          closeTimeEl.textContent = CLOSE_HOUR + ':00';
      }
    }
    updateCountdown();
    setInterval(updateCountdown, 60000);
  }
})();

// Token e log vetrina
var token = sessionStorage.getItem('bibaVetrinaToken');
if(!token){
  token = genToken();
  sessionStorage.setItem('bibaVetrinaToken', token);
  logSheet(token, 'vetrina');
}
var el = document.getElementById('discount-code');
if(el) el.textContent = token;

// CTA: logga cassa quando il cliente mostra lo schermo al banco
function claimOffer(){
  var alreadyClaimed = sessionStorage.getItem('bibaCassaLogged');
  if(alreadyClaimed) return;
  sessionStorage.setItem('bibaCassaLogged', '1');
  logSheet(token, 'cassa');

  var btn = document.getElementById('cta-btn');
  if(btn){
    btn.classList.add('confirmed');
    btn.innerHTML = '<span class="cta-icon">✅</span> OFFER ACTIVATED — SHOW TO STAFF';
  }
}
</script>
</body>
</html>
