<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Unlocked Boutique Reward</title>

<style>
body{
    margin:0;
    padding:0;
    background:#f7f2ea;
    font-family:Arial, Helvetica, sans-serif;
    color:#2d2d2d;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:90%;
    max-width:420px;
    background:white;
    border-radius:24px;
    padding:40px 30px;
    text-align:center;
    box-shadow:0 10px 35px rgba(0,0,0,0.12);
}

.icon{
    font-size:58px;
    margin-bottom:20px;
}

h1{
    margin:0;
    font-size:38px;
    letter-spacing:2px;
    color:#111;
}

.line{
    width:70px;
    height:3px;
    background:#c9a86a;
    margin:22px auto;
    border-radius:10px;
}

.text{
    font-size:18px;
    line-height:1.7;
    color:#555;
}

.highlight{
    color:#000;
    font-weight:bold;
}

.note{
    margin-top:28px;
    font-size:14px;
    color:#9b8b74;
    letter-spacing:1px;
}

.button{
    margin-top:35px;
    display:inline-block;
    padding:16px 28px;
    background:#111;
    color:white;
    text-decoration:none;
    border-radius:40px;
    font-size:15px;
    letter-spacing:1px;
    transition:0.3s;
}

.button:hover{
    background:#c9a86a;
    color:#111;
}

.code-wrap{
    margin-top:24px;
    font-size:11px;
    letter-spacing:2px;
    color:#bbb;
    text-transform:uppercase;
}

.code-wrap span{
    display:inline-block;
    margin-top:6px;
    font-size:13px;
    letter-spacing:3px;
    color:#c9a86a;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

  <div class="icon">🎁</div>

  <h1>UNLOCKED</h1>

  <div class="line"></div>

  <div class="text">
    Return tomorrow and show this page in store to activate your private shopping privilege.
  </div>

  <div class="note">
    ✨ Exclusive for QR visitors only
  </div>

  <a href="#" class="button">
    CLAIM IN STORE
  </a>

  <div class="code-wrap">
    your code<br>
    <span id="discount-code">BIBA-···</span>
  </div>

</div>

<script>
(function() {
  var GAS = 'https://script.google.com/macros/s/AKfycbx0Qd3zb39OjjG4BhOjX3Ph7h85WIYMGnBm9imZn3tSej54h4YWaAlFjfeIwG400_Jx/exec';

  function genToken() {
    var c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789', t = 'BIBA-';
    for (var i = 0; i < 6; i++) t += c[Math.floor(Math.random() * c.length)];
    return t;
  }

  function logSheet(token, tipo) {
    try {
      fetch(GAS, {
        method: 'POST', mode: 'no-cors',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ token: token, tipo: tipo, timestamp: new Date().toISOString() })
      });
    } catch(e) {}
  }

  var token = sessionStorage.getItem('bibaVetrinaToken');
  if (!token) {
    token = genToken();
    sessionStorage.setItem('bibaVetrinaToken', token);
    logSheet(token, 'vetrina');
  }

  var el = document.getElementById('discount-code');
  if (el) el.textContent = token;
})();
</script>
</body>
</html>
