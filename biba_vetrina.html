<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regalo Sbloccato</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #d8b76a;
  font-family: Arial, sans-serif;
  text-align: center;
}

.box {
  margin: 25px auto;
  padding: 35px 20px;
  width: 88%;
  max-width: 430px;
  border: 1px solid #6b5522;
  box-shadow: 0 0 25px rgba(216,183,106,0.15);
}

h1 {
  letter-spacing: 10px;
  font-size: 20px;
  margin-bottom: 35px;
}

.gift {
  font-size: 105px;
  animation: blinkGift 1s infinite alternate;
}

@keyframes blinkGift {
  from {
    transform: scale(1);
    filter: drop-shadow(0 0 5px #d8b76a);
  }
  to {
    transform: scale(1.12);
    filter: drop-shadow(0 0 30px #ffd700);
  }
}

.discount {
  color: #ffe22c;
  font-size: 60px;
  font-weight: 900;
  margin: 25px 0 5px;
}

.subtitle {
  color: white;
  font-size: 28px;
  font-weight: 900;
  margin-bottom: 35px;
}

.text {
  color: #fff;
  font-size: 18px;
  line-height: 1.5;
  margin: 25px 10px;
}

.code-label {
  letter-spacing: 6px;
  font-size: 13px;
  margin-top: 30px;
  opacity: 0.8;
}

.code {
  border: 2px solid #d8b76a;
  padding: 15px;
  margin: 12px auto 25px;
  font-size: 26px;
  letter-spacing: 5px;
  font-weight: bold;
  color: #d8b76a;
}

.warning {
  color: #d8b76a;
  font-size: 15px;
  margin-top: 25px;
}

.button {
  background: #d60000;
  color: white;
  padding: 18px;
  border-radius: 5px;
  font-size: 18px;
  font-weight: 900;
  letter-spacing: 4px;
  margin-top: 30px;
}
</style>
</head>

<body>

<div class="box">

  <h1>REGALO SBLOCCATO</h1>

  <div class="gift">🎁</div>

  <div class="discount">5%</div>
  <div class="subtitle">DI SCONTO</div>

  <div class="text">
    Domani torna da <strong>Biba Boutique</strong>.<br><br>
    Mostra questo codice o uno screenshot alla cassa e riceverai il
    <strong>5% di sconto su tutti i tuoi acquisti.</strong>
  </div>

  <div class="code-label">IL TUO CODICE</div>

  <div class="code" id="discount-code">BIBA-…</div>

  <div class="warning">
    Valido solo domani.<br>
    Porta lo screenshot con te.
  </div>

  <div class="button">📱 MOSTRA ALLA CASSA</div>

</div>


<script>
(function() {
  var GAS = 'https://script.google.com/macros/s/AKfycbx0Qd3zb39OjjG4BhOjX3Ph7h85WIYMGnBm9imZn3tSej54h4YWaAlFjfeIwG400_Jx/exec';

  function genToken() {
    var c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789', t = 'BIBA-';
    for (var i = 0; i < 6; i++) t += c[Math.floor(Math.random() * c.length)];
    return t;
  }

  function logSheet(token, tipo) {
    try {
      fetch(GAS, {
        method: 'POST', mode: 'no-cors',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ token: token, tipo: tipo, timestamp: new Date().toISOString() })
      });
    } catch(e) {}
  }

  var token = sessionStorage.getItem('bibaVetrinaToken');
  if (!token) {
    token = genToken();
    sessionStorage.setItem('bibaVetrinaToken', token);
    logSheet(token, 'vetrina');
  }

  var el = document.getElementById('discount-code');
  if (el) el.textContent = token;
})();
</script>
</body>
</html>
